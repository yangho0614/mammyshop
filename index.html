<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務訂購系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#1c2b2d;
    --ink-soft:#4a5a5c;
    --line:#dde3e1;
    --paper:#fafaf8;
    --panel:#ffffff;
    --brand:#2f6f5e;
    --brand-dark:#1f4d40;
    --brand-tint:#eaf3f0;
    --warn:#b5762b;
    --warn-tint:#fbf0e2;
    --danger:#a3402f;
    --danger-tint:#fbeae6;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  #root{min-height:100vh;}

  /* ---------- 登入畫面 ---------- */
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .login-card{
    width:100%;
    max-width:380px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:32px 28px;
  }
  .login-card h1{
    font-size:20px;
    margin:0 0 4px;
    letter-spacing:.02em;
  }
  .login-card p.sub{
    color:var(--ink-soft);
    font-size:13px;
    margin:0 0 24px;
  }
  .cust-btn{
    display:block;
    width:100%;
    text-align:left;
    padding:14px 16px;
    margin-bottom:8px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    font-size:15px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .cust-btn:hover{border-color:var(--brand); background:var(--brand-tint);}

  .taxid-input{
    width:100%;
    padding:13px 14px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:18px;
    letter-spacing:.08em;
    margin-bottom:10px;
  }
  .taxid-input:focus{
    outline:none;
    border-color:var(--brand);
  }
  .login-error{
    font-size:13px;
    color:var(--danger);
    background:var(--danger-tint);
    padding:9px 12px;
    border-radius:6px;
    margin-bottom:12px;
    line-height:1.5;
  }
  .login-hint{
    font-size:12px;
    color:#9aa6a4;
    margin-top:14px;
    text-align:center;
  }
  .confirm-box{
    border:1px solid var(--line);
    background:var(--brand-tint);
    border-radius:8px;
    padding:14px 16px;
    margin-bottom:16px;
  }
  .confirm-row{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    padding:6px 0;
  }
  .confirm-row span{color:var(--ink-soft);}
  .confirm-row b{color:var(--brand-dark);}
  .branch-list{
    margin-bottom:16px;
    max-height:240px;
    overflow-y:auto;
  }
  .branch-btn{
    display:block;
    width:100%;
    text-align:left;
    padding:12px 14px;
    margin-bottom:6px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
  }
  .branch-btn.active{
    border-color:var(--brand);
    background:var(--brand-tint);
    font-weight:600;
  }

  /* ---------- 版面 ---------- */
  .app-header{
    position:sticky; top:0; z-index:20;
    background:var(--panel);
    border-bottom:1px solid var(--line);
    padding:10px 16px;
    display:flex;
    align-items:center;
    gap:12px;
  }
  .app-header .who{
    font-size:13px;
    color:var(--ink-soft);
  }
  .app-header .who b{color:var(--ink);}
  .search-box{
    flex:1;
    max-width:420px;
    position:relative;
  }
  .search-box input{
    width:100%;
    padding:8px 12px 8px 32px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    background:#fff;
  }
  .search-box::before{
    content:"";
  }
  .cart-pill{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--brand);
    color:#fff;
    border:none;
    border-radius:20px;
    padding:8px 16px;
    font-size:14px;
    cursor:pointer;
  }
  .logout-link{
    font-size:12px;
    color:var(--ink-soft);
    background:none;
    border:none;
    text-decoration:underline;
    cursor:pointer;
    padding:0;
  }

  .layout{
    display:flex;
    max-width:1200px;
    margin:0 auto;
  }
  .sidebar{
    width:180px;
    flex-shrink:0;
    padding:18px 12px;
    border-right:1px solid var(--line);
    position:sticky;
    top:53px;
    align-self:flex-start;
    height:calc(100vh - 53px);
    overflow-y:auto;
  }
  .sidebar button{
    display:block;
    width:100%;
    text-align:left;
    padding:9px 10px;
    margin-bottom:2px;
    border:none;
    background:none;
    border-radius:6px;
    font-size:14px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .sidebar button.active{
    background:var(--brand-tint);
    color:var(--brand-dark);
    font-weight:600;
  }
  .sidebar .count{
    float:right;
    color:#9aa6a4;
    font-size:12px;
  }

  .main{
    flex:1;
    padding:18px 20px 80px;
    min-width:0;
  }
  .main h2{
    font-size:16px;
    margin:0 0 14px;
    color:var(--ink);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:12px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .card .code{
    font-size:11px;
    color:#9aa6a4;
    letter-spacing:.03em;
  }
  .card .name{
    font-size:14px;
    line-height:1.4;
    min-height:38px;
  }
  .card .price-row{
    display:flex;
    align-items:baseline;
    gap:6px;
  }
  .card .unit-price{
    font-size:18px;
    font-weight:700;
    color:var(--brand-dark);
  }
  .card .list-price{
    font-size:12px;
    color:#9aa6a4;
    text-decoration:line-through;
  }
  .card .box-qty{
    font-size:12px;
    color:var(--ink-soft);
  }
  .tag{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:4px;
    width:fit-content;
  }
  .tag.gift{background:var(--brand-tint); color:var(--brand-dark);}
  .tag.box{background:#eef1fb; color:#3d4f9e;}
  .tag.review{background:var(--warn-tint); color:var(--warn);}
  .tag.stop{background:var(--danger-tint); color:var(--danger);}

  .qty-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:auto;
  }
  .qty-row button{
    width:30px; height:30px;
    border:1px solid var(--line);
    background:#fff;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
  }
  .qty-row input{
    width:48px;
    text-align:center;
    padding:6px 2px;
    border:1px solid var(--line);
    border-radius:6px;
    font-size:14px;
  }
  .qty-row .added{
    margin-left:auto;
    font-size:12px;
    color:var(--brand-dark);
  }
  .card.disabled{opacity:.55;}
  .card.disabled .qty-row button, .card.disabled .qty-row input{
    pointer-events:none;
    background:#f3f3f1;
  }

  /* ---------- 商品卡片圖片 ---------- */
  .card-img-wrap{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:#f4f6f5;
    border-radius:6px;
    overflow:hidden;
    cursor:pointer;
  }
  .card-img-wrap img{
    width:100%; height:100%;
    object-fit:contain;
    display:block;
  }
  .card-img-placeholder{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; color:#c8d0ce;
  }
  .card-img-count{
    position:absolute; bottom:5px; right:7px;
    background:rgba(0,0,0,.45);
    color:#fff; font-size:10px;
    padding:2px 6px; border-radius:10px;
  }

  /* ---------- 圖片燈箱 ---------- */
  .lightbox-mask{
    position:fixed; inset:0; z-index:60;
    background:rgba(0,0,0,.82);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .lightbox-inner{
    position:relative;
    max-width:90vw; max-height:90vh;
    display:flex; align-items:center; gap:12px;
  }
  .lightbox-inner img{
    max-width:80vw; max-height:82vh;
    object-fit:contain; border-radius:6px;
  }
  .lightbox-btn{
    background:rgba(255,255,255,.15);
    border:none; color:#fff; font-size:28px;
    width:44px; height:44px; border-radius:50%;
    cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
  }
  .lightbox-btn:hover{ background:rgba(255,255,255,.28); }
  .lightbox-close{
    position:absolute; top:-44px; right:0;
    background:none; border:none; color:#fff;
    font-size:26px; cursor:pointer; padding:4px 8px;
  }
  .lightbox-dots{
    position:absolute; bottom:-32px; left:50%; transform:translateX(-50%);
    display:flex; gap:6px;
  }
  .lightbox-dots span{
    width:7px; height:7px; border-radius:50%;
    background:rgba(255,255,255,.35); cursor:pointer;
  }
  .lightbox-dots span.active{ background:#fff; }

  /* ---------- 後台圖片管理面板 ---------- */
  .img-mgmt-panel{
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:16px;
    margin-top:12px;
  }
  .img-mgmt-panel h4{ margin:0 0 12px; font-size:14px; }
  .img-grid{
    display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px;
  }
  .img-thumb{
    position:relative;
    width:90px; height:90px;
    border-radius:6px; overflow:hidden;
    border:1px solid var(--line);
  }
  .img-thumb img{ width:100%; height:100%; object-fit:cover; }
  .img-thumb .del-btn{
    position:absolute; top:3px; right:3px;
    background:rgba(163,64,47,.85); color:#fff;
    border:none; border-radius:50%;
    width:20px; height:20px; font-size:12px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    line-height:1;
  }
  .img-upload-btn{
    width:90px; height:90px;
    border:2px dashed var(--line);
    border-radius:6px;
    background:#fafaf8;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    cursor:pointer; font-size:11px; color:var(--ink-soft); gap:4px;
  }
  .img-upload-btn:hover{ border-color:var(--brand); color:var(--brand); }
  .img-upload-btn span{ font-size:22px; }
  .img-search-bar{
    display:flex; gap:8px; margin-bottom:14px;
  }
  .img-search-bar input{
    flex:1; padding:8px 11px;
    border:1px solid var(--line); border-radius:8px; font-size:13px;
  }
  .product-img-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-bottom:1px solid var(--line);
  }
  .product-img-row:last-child{ border-bottom:none; }
  .product-img-row .pinfo{ flex:1; min-width:0; }
  .product-img-row .pcode{ font-size:11px; color:#9aa6a4; }
  .product-img-row .pname{ font-size:13px; line-height:1.4; }
  .uploading-mask{
    position:fixed; inset:0; z-index:70;
    background:rgba(20,30,28,.5);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:16px; flex-direction:column; gap:10px;
  }
  .drawer-mask{
    position:fixed; inset:0;
    background:rgba(20,30,28,.35);
    z-index:30;
  }
  .drawer{
    position:fixed;
    top:0; right:0;
    width:min(420px, 100vw);
    height:100vh;
    background:var(--panel);
    z-index:31;
    display:flex;
    flex-direction:column;
    box-shadow:-8px 0 24px rgba(0,0,0,.08);
  }
  .drawer-head{
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .drawer-head h3{margin:0; font-size:16px;}
  .drawer-head button{
    background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft);
  }
  .drawer-body{
    flex:1;
    overflow-y:auto;
    padding:12px 18px;
  }
  .cart-line{
    display:flex;
    gap:10px;
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .cart-line .info{flex:1; min-width:0;}
  .cart-line .name{font-size:13px; line-height:1.4;}
  .cart-line .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  .cart-line .remove{
    background:none; border:none; color:var(--danger); font-size:12px; cursor:pointer; padding:0;
    text-decoration:underline;
  }
  .cart-line .lineprice{font-size:13px; font-weight:600; white-space:nowrap;}

  .drawer-foot{
    border-top:1px solid var(--line);
    padding:16px 18px;
  }
  .total-row{
    display:flex;
    justify-content:space-between;
    font-size:15px;
    margin-bottom:4px;
  }
  .total-row.grand{
    font-size:18px;
    font-weight:700;
    margin-top:8px;
  }
  .review-note{
    font-size:12px;
    color:var(--warn);
    background:var(--warn-tint);
    padding:8px 10px;
    border-radius:6px;
    margin:10px 0;
    line-height:1.5;
  }
  .submit-btn{
    width:100%;
    padding:13px;
    background:var(--brand);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
  }
  .submit-btn:disabled{background:#c7cdcb; cursor:not-allowed;}
  .empty-cart{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:14px;
  }

  /* ---------- 訂單完成畫面 ---------- */
  .confirm-wrap{
    max-width:560px;
    margin:60px auto;
    padding:0 20px;
    text-align:center;
  }
  .confirm-wrap .badge{
    width:56px;height:56px;
    border-radius:50%;
    background:var(--brand-tint);
    color:var(--brand-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    margin:0 auto 16px;
  }
  .confirm-wrap h2{margin:0 0 8px;}
  .confirm-wrap p{color:var(--ink-soft); font-size:14px; line-height:1.7;}
  .order-id{
    display:inline-block;
    background:var(--brand-tint);
    color:var(--brand-dark);
    padding:6px 14px;
    border-radius:6px;
    font-family:monospace;
    font-size:13px;
    margin:8px 0 20px;
  }
  .ghost-btn{
    padding:11px 22px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
    margin-top:8px;
  }

  /* ---------- 後台(老闆)畫面 ---------- */
  .admin-wrap{
    max-width:1000px;
    margin:0 auto;
    padding:20px;
  }
  .admin-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .admin-table th{
    text-align:left;
    background:#f4f6f5;
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    font-weight:600;
  }
  .admin-table td{
    padding:10px 12px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .download-btn{
    background:var(--brand);
    color:#fff;
    border:none;
    padding:8px 16px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
  }
  .pill-status{
    display:inline-block;
    font-size:11px;
    padding:2px 8px;
    border-radius:10px;
  }
  .pill-status.ok{background:var(--brand-tint); color:var(--brand-dark);}
  .pill-status.review{background:var(--warn-tint); color:var(--warn);}

  @media (max-width:760px){
    .sidebar{
      position:static;
      width:100%;
      height:auto;
      border-right:none;
      border-bottom:1px solid var(--line);
      display:flex;
      overflow-x:auto;
      padding:10px 12px;
      gap:4px;
    }
    .sidebar button{white-space:nowrap; width:auto;}
    .sidebar .count{display:none;}
    .layout{flex-direction:column;}
    .drawer{width:100vw;}
    .app-header{flex-wrap:wrap;}
    .search-box{order:3; max-width:100%; flex:1 1 100%;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

// localStorage key 常數
const LS_CUSTOMER = "order_customer";
const LS_PRODUCTS = "order_products";
const IDLE_MINUTES = 30; // 閒置幾分鐘後自動登出

// ---------------------------------------------------------------
// 測試資料：來自實際上傳的客戶訂貨單(已抽取核心欄位)
// 正式上線時，這個區塊會換成從後端/資料庫讀取
// ---------------------------------------------------------------
// ---------------------------------------------------------------
// GAS 後端設定：所有客戶名單/商品/價格/訂單資料都改由後端的
// Google試算表讀寫，這裡不再寫死任何測試資料
// ---------------------------------------------------------------
const GAS_URL = "https://script.google.com/macros/s/AKfycby48Nyzb4q5265opAIWwRGTdBFlnYnsa-0lS9w0EIGAaRVCNBYqvd9Wc5Hip2DySgEiwQ/exec";

async function callGAS(action, payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" }, // 避免觸發瀏覽器的CORS預檢請求
    body: JSON.stringify(Object.assign({ action: action }, payload)),
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "後端回應失敗");
  return data;
}

// ---------------------------------------------------------------
// 促銷規則判斷：分三類
// 1. autoGift  -> N+M 買贈，可全自動算贈品數量(不計價)
// 2. autoBox   -> 成箱固定價，可全自動算金額
// 3. needReview-> 規則模糊(促/合清價/合清直走/未達3000加運/洗衣精活動贈品/70U)，標註待人工複核
// ---------------------------------------------------------------
function parseActivity(activity) {
  if (!activity) return null;
  const a = activity.trim();

  // 成箱固定價：例如 "成箱$1944"
  const boxMatch = a.match(/成箱\$?(\d+)/);
  if (boxMatch) {
    return { type: "autoBox", boxPrice: Number(boxMatch[1]), label: `整箱 $${boxMatch[1]}` };
  }

  // 標準買贈：例如 "2+1" "4+2" "5+1" "7+3" "10+2" "11+1"
  const giftMatch = a.match(/^(\d+)\+(\d+)$/);
  if (giftMatch) {
    return { type: "autoGift", buy: Number(giftMatch[1]), free: Number(giftMatch[2]), label: `買${giftMatch[1]}送${giftMatch[2]}` };
  }

  // 其餘一律視為需人工複核(促、合清價、合清直走、未達3000加運、洗衣精活動贈品、70U...)
  return { type: "needReview", label: a };
}

function computeLine(product, qty) {
  const rule = parseActivity(product.activity);
  let payQty = qty;
  let giftQty = 0;
  let amount = qty * product.unitPrice;
  let flag = null;

  if (rule && rule.type === "autoGift" && qty > 0) {
    const sets = Math.floor(qty / rule.buy);
    giftQty = sets * rule.free;
    // 贈品不計價，付費數量仍是 qty(贈品另外出貨，不影響應付金額)
    amount = qty * product.unitPrice;
  } else if (rule && rule.type === "autoBox" && qty > 0) {
    const boxQty = Number(product.boxQty) || 1;
    const boxes = Math.ceil(qty / boxQty);
    amount = boxes * rule.boxPrice;
    flag = `依整箱價計算，共 ${boxes} 箱`;
  } else if (rule && rule.type === "needReview") {
    flag = "review";
  }

  return { payQty, giftQty, amount, rule, flag };
}

// ---------------------------------------------------------------
// 主程式
// ---------------------------------------------------------------
function App() {
  // 從 localStorage 還原登入狀態
  const [stage, setStage] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(LS_CUSTOMER));
      return saved ? "shop" : "login";
    } catch { return "login"; }
  });
  const [customer, setCustomer] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_CUSTOMER)) || null; } catch { return null; }
  });
  const [products, setProducts] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_PRODUCTS)) || []; } catch { return []; }
  });
  const [taxIdInput, setTaxIdInput] = useState("");
  const [loginError, setLoginError] = useState("");
  const [loginStep, setLoginStep] = useState("input");
  const [pendingCompany, setPendingCompany] = useState(null);
  const [selectedBranchCode, setSelectedBranchCode] = useState("");
  const [cart, setCart] = useState({});
  const [search, setSearch] = useState("");
  const [activeCat, setActiveCat] = useState("全部");
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [orders, setOrders] = useState([]);
  const [lastOrder, setLastOrder] = useState(null);
  const [loading, setLoading] = useState(false);
  const [pageError, setPageError] = useState("");
  const [submitting, setSubmitting] = useState(false);

  // 閒置計時 ref
  const idleTimer = useRef(null);

  // 後台密碼 state
  const [adminAuthed, setAdminAuthed] = useState(() => sessionStorage.getItem("adminAuthed") === "1");
  const [adminPwInput, setAdminPwInput] = useState("");
  const [adminPwError, setAdminPwError] = useState("");

  // 後台篩選 state
  const [filterCustomer, setFilterCustomer] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterDateFrom, setFilterDateFrom] = useState("");
  const [filterDateTo, setFilterDateTo] = useState("");

  // 批次勾選 state
  const [checkedOrders, setCheckedOrders] = useState({});

  // 燈箱 state
  const [lightbox, setLightbox] = useState(null); // { images:[], index:0, productName:"" }

  // 後台圖片管理 state
  const [adminTab, setAdminTab] = useState("orders"); // orders | images
  const [imgSearch, setImgSearch] = useState("");
  const [uploadingProduct, setUploadingProduct] = useState(null);
  const fileInputRef = useRef(null);

  const categories = useMemo(() => {
    const set = new Set(products.map(p => p.category));
    return ["全部", ...set];
  }, [products]);

  const filtered = useMemo(() => {
    return products.filter(p => {
      const inCat = activeCat === "全部" || p.category === activeCat;
      const inSearch = !search || p.name.includes(search) || p.code.includes(search);
      return inCat && inSearch;
    });
  }, [products, activeCat, search]);

  const cartLines = useMemo(() => {
    return Object.entries(cart)
      .filter(([_, qty]) => qty > 0)
      .map(([code, qty]) => {
        const product = products.find(p => p.code === code);
        const calc = computeLine(product, qty);
        return { product, qty, ...calc };
      });
  }, [cart, products]);

  const cartCount = cartLines.reduce((s, l) => s + l.qty, 0);
  const cartTotal = cartLines.reduce((s, l) => s + l.amount, 0);
  const hasReviewItem = cartLines.some(l => l.flag === "review");

  function setQty(code, qty) {
    setCart(prev => ({ ...prev, [code]: Math.max(0, qty) }));
  }

  async function handleTaxIdSubmit() {
    const id = taxIdInput.trim();
    if (!id) {
      setLoginError("請輸入統一編號");
      return;
    }
    setLoginError("");
    setLoading(true);
    try {
      const data = await callGAS("lookupTaxId", { taxId: id });
      const found = { companyName: data.companyName, branches: data.branches };
      setPendingCompany(found);
      if (found.branches.length > 1) {
        setLoginStep("chooseBranch");
      } else {
        setSelectedBranchCode(found.branches[0].code);
        setLoginStep("confirm");
      }
    } catch (err) {
      setLoginError(err.message || "查無此統一編號對應的客戶資料，請確認輸入是否正確，或聯繫業務人員");
    } finally {
      setLoading(false);
    }
  }

  async function handleConfirmLogin() {
    const branch = pendingCompany.branches.find(b => b.code === selectedBranchCode) || pendingCompany.branches[0];
    const newCustomer = {
      name: pendingCompany.companyName,
      branchName: branch.name,
      code: branch.code,
      taxId: taxIdInput.trim(),
    };
    setLoading(true);
    setPageError("");
    try {
      const data = await callGAS("getProducts", { branchCode: branch.code });
      // 寫入 localStorage 讓重整後還原
      localStorage.setItem(LS_CUSTOMER, JSON.stringify(newCustomer));
      localStorage.setItem(LS_PRODUCTS, JSON.stringify(data.products));
      setProducts(data.products);
      setCustomer(newCustomer);
      setStage("shop");
      resetIdleTimer();
    } catch (err) {
      setLoginError("商品資料載入失敗：" + err.message);
    } finally {
      setLoading(false);
    }
  }

  function backToTaxIdInput() {
    setLoginStep("input");
    setPendingCompany(null);
    setSelectedBranchCode("");
    setLoginError("");
  }

  function resetLogin() {
    localStorage.removeItem(LS_CUSTOMER);
    localStorage.removeItem(LS_PRODUCTS);
    if (idleTimer.current) clearTimeout(idleTimer.current);
    setStage("login");
    setCustomer(null);
    setCart({});
    setTaxIdInput("");
    setLoginError("");
    setLoginStep("input");
    setPendingCompany(null);
    setSelectedBranchCode("");
    setProducts([]);
  }

  // --- 閒置計時：任何操作都重置，IDLE_MINUTES 分鐘無動作自動登出 ---
  function resetIdleTimer() {
    if (idleTimer.current) clearTimeout(idleTimer.current);
    idleTimer.current = setTimeout(() => {
      resetLogin();
      alert(`您已閒置超過 ${IDLE_MINUTES} 分鐘，已自動登出。`);
    }, IDLE_MINUTES * 60 * 1000);
  }

  useEffect(() => {
    if (stage === "shop") {
      const events = ["mousedown", "keydown", "touchstart", "scroll"];
      const handler = () => resetIdleTimer();
      events.forEach(e => window.addEventListener(e, handler, { passive: true }));
      resetIdleTimer();
      return () => {
        events.forEach(e => window.removeEventListener(e, handler));
        if (idleTimer.current) clearTimeout(idleTimer.current);
      };
    }
  }, [stage]);

  // --- 燈箱控制 ---
  function openLightbox(images, index, productName) {
    setLightbox({ images, index, productName });
  }
  function closeLightbox() { setLightbox(null); }
  function lightboxPrev() { setLightbox(lb => ({ ...lb, index: (lb.index - 1 + lb.images.length) % lb.images.length })); }
  function lightboxNext() { setLightbox(lb => ({ ...lb, index: (lb.index + 1) % lb.images.length })); }

  // --- 圖片上傳 ---
  async function handleImageUpload(productCode, file) {
    setUploadingProduct(productCode);
    try {
      const reader = new FileReader();
      const base64 = await new Promise((res, rej) => {
        reader.onload = e => res(e.target.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      const data = await callGAS("uploadImage", {
        productCode,
        fileName: file.name,
        base64Data: base64,
        mimeType: file.type || "image/jpeg",
      });
      // 更新本地 products 立即顯示
      setProducts(prev => {
        const next = prev.map(p => {
          if (p.code !== productCode) return p;
          return { ...p, images: [...(p.images || []), data.imageUrl] };
        });
        localStorage.setItem(LS_PRODUCTS, JSON.stringify(next));
        return next;
      });
    } catch (err) {
      alert("上傳失敗：" + err.message);
    } finally {
      setUploadingProduct(null);
    }
  }

  // --- 圖片刪除 ---
  async function handleImageDelete(productCode, imageUrl) {
    if (!confirm("確定刪除此張圖片？")) return;
    setUploadingProduct(productCode);
    try {
      await callGAS("deleteImage", { productCode, imageUrl });
      setProducts(prev => {
        const next = prev.map(p => {
          if (p.code !== productCode) return p;
          return { ...p, images: (p.images || []).filter(u => u !== imageUrl) };
        });
        localStorage.setItem(LS_PRODUCTS, JSON.stringify(next));
        return next;
      });
    } catch (err) {
      alert("刪除失敗：" + err.message);
    } finally {
      setUploadingProduct(null);
    }
  }

  async function submitOrder() {
    setSubmitting(true);
    setPageError("");
    try {
      const payload = {
        taxId: customer.taxId,
        customerName: customer.name,
        branchCode: customer.code,
        lines: cartLines.map(l => ({
          code: l.product.code,
          name: l.product.name,
          qty: l.qty,
          giftQty: l.giftQty || 0,
          unitPrice: l.product.unitPrice,
          amount: l.amount,
          activity: l.product.activity || "",
          needsReview: l.flag === "review",
        })),
      };
      const data = await callGAS("submitOrder", { order: payload });
      setLastOrder({
        id: data.orderId,
        customer: customer.name,
        branchName: customer.branchName,
        needsReview: hasReviewItem,
      });
      setCart({});
      setDrawerOpen(false);
      setStage("confirmed");
    } catch (err) {
      setPageError("訂單送出失敗：" + err.message + "，請稍後再試一次");
    } finally {
      setSubmitting(false);
    }
  }

  async function loadOrders() {
    setLoading(true);
    setPageError("");
    try {
      const data = await callGAS("listOrders", {});
      setOrders(data.orders);
    } catch (err) {
      setPageError("訂單清單載入失敗：" + err.message);
    } finally {
      setLoading(false);
    }
  }

  function exportExcel(order) {
    const rows = order.lines.map(l => ({
      "客戶代號": order.branchCode,
      "客戶名稱": order.customerName,
      "產品編號": l.code,
      "品名": l.name,
      "訂購數量": l.qty,
      "贈品數量": l.giftQty || 0,
      "單價": l.unitPrice,
      "金額": l.amount,
      "促銷規則": l.activity || "",
      "狀態": l.status,
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "訂單明細");
    XLSX.writeFile(wb, `${order.orderId}_${order.customerName}.xlsx`);
  }

  // ---------------- 登入畫面 ----------------
  if (stage === "login") {
    return (
      <div className="login-wrap">
        <div className="login-card">
          <h1>業務訂購系統</h1>

          {loginStep === "input" && (
            <React.Fragment>
              <p className="sub">請輸入統一編號，系統將自動帶出對應的客戶資料</p>
              <input
                className="taxid-input"
                placeholder="請輸入統一編號"
                value={taxIdInput}
                maxLength={8}
                inputMode="numeric"
                pattern="[0-9]*"
                autoComplete="off"
                onChange={e => { setTaxIdInput(e.target.value.replace(/\D/g, "")); setLoginError(""); }}
                onKeyDown={e => { if (e.key === "Enter") handleTaxIdSubmit(); }}
              />
              {loginError && <div className="login-error">{loginError}</div>}
              <button className="submit-btn" disabled={loading} onClick={handleTaxIdSubmit}>
                {loading ? "查詢中…" : "查詢"}
              </button>
            </React.Fragment>
          )}

          {loginStep === "confirm" && pendingCompany && (
            <React.Fragment>
              <p className="sub">請核對以下客戶資料是否正確</p>
              <div className="confirm-box">
                <div className="confirm-row"><span>統一編號</span><b>{taxIdInput}</b></div>
                <div className="confirm-row"><span>客戶名稱</span><b>{pendingCompany.companyName}</b></div>
                <div className="confirm-row"><span>出貨對象</span><b>{pendingCompany.branches[0].name}（{pendingCompany.branches[0].code}）</b></div>
              </div>
              {loginError && <div className="login-error">{loginError}</div>}
              <button className="submit-btn" disabled={loading} onClick={handleConfirmLogin}>
                {loading ? "登入中…" : "確認並登入"}
              </button>
              <button className="ghost-btn" style={{width:"100%", marginTop:8}} onClick={backToTaxIdInput}>重新輸入統編</button>
            </React.Fragment>
          )}

          {loginStep === "chooseBranch" && pendingCompany && (
            <React.Fragment>
              <p className="sub">
                統編 {taxIdInput}「{pendingCompany.companyName}」名下有多個分店，請選擇本次要代表哪一個分店下單
              </p>
              <div className="branch-list">
                {pendingCompany.branches.map(b => (
                  <button
                    key={b.code}
                    className={"branch-btn" + (selectedBranchCode === b.code ? " active" : "")}
                    onClick={() => setSelectedBranchCode(b.code)}
                  >
                    {b.name} <span style={{color:"#9aa6a4", fontSize:12}}>（{b.code}）</span>
                  </button>
                ))}
              </div>
              {loginError && <div className="login-error">{loginError}</div>}
              <button className="submit-btn" disabled={!selectedBranchCode || loading} onClick={handleConfirmLogin}>
                {loading ? "登入中…" : "確認並登入"}
              </button>
              <button className="ghost-btn" style={{width:"100%", marginTop:8}} onClick={backToTaxIdInput}>重新輸入統編</button>
            </React.Fragment>
          )}

          {loginStep === "input" && (
            <button className="cust-btn" style={{marginTop:24, background:"#f4f6f5"}} onClick={() => { setStage("admin"); loadOrders(); }}>
              內部後台（查看所有訂單）
            </button>
          )}
        </div>
      </div>
    );
  }

  // ---------------- 後台畫面 ----------------
  if (stage === "admin") {
    const ADMIN_PASSWORD = "0000"; // ← 修改此處變更後台密碼

    function handleAdminLogin() {
      if (adminPwInput === ADMIN_PASSWORD) {
        sessionStorage.setItem("adminAuthed", "1");
        setAdminAuthed(true);
        setAdminPwError("");
        loadOrders();
      } else {
        setAdminPwError("密碼錯誤，請重新輸入");
        setAdminPwInput("");
      }
    }

    function handleAdminLogout() {
      sessionStorage.removeItem("adminAuthed");
      setAdminAuthed(false);
      setAdminPwInput("");
      setOrders([]);
      setCheckedOrders({});
      resetLogin();
    }

    const filteredOrders = orders.filter(o => {
      if (filterCustomer && !o.customerName.includes(filterCustomer) && !o.branchCode.includes(filterCustomer)) return false;
      if (filterStatus === "ok" && o.needsReview) return false;
      if (filterStatus === "review" && !o.needsReview) return false;
      if (filterDateFrom && o.time < filterDateFrom) return false;
      if (filterDateTo && o.time > filterDateTo + " 99") return false;
      return true;
    });

    const adminStats = {
      count: filteredOrders.length,
      total: filteredOrders.reduce((s, o) => s + o.total, 0),
      reviewCount: filteredOrders.filter(o => o.needsReview).length,
    };

    const checkedList = filteredOrders.filter(o => checkedOrders[o.orderId]);
    const allChecked = filteredOrders.length > 0 && checkedList.length === filteredOrders.length;

    function toggleCheck(orderId) { setCheckedOrders(prev => ({ ...prev, [orderId]: !prev[orderId] })); }
    function toggleAll() {
      if (allChecked) { setCheckedOrders({}); }
      else { const n = {}; filteredOrders.forEach(o => { n[o.orderId] = true; }); setCheckedOrders(n); }
    }

    function exportBatch() {
      const targets = checkedList.length > 0 ? checkedList : filteredOrders;
      const rows = [];
      targets.forEach(o => o.lines.forEach(l => rows.push({
        "訂單編號": o.orderId, "客戶代號": o.branchCode, "客戶名稱": o.customerName,
        "下單時間": o.time, "產品編號": l.code, "品名": l.name,
        "訂購數量": l.qty, "贈品數量": l.giftQty || 0, "單價": l.unitPrice,
        "金額": l.amount, "促銷規則": l.activity || "", "狀態": l.status,
      })));
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "訂單明細");
      const now = new Date();
      const d = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}`;
      XLSX.writeFile(wb, `訂單匯出_${d}.xlsx`);
    }

    // 圖片管理用的商品清單（依 imgSearch 篩選，只顯示有在 products 快取中的商品）
    const imgProducts = products.filter(p =>
      !imgSearch || p.name.includes(imgSearch) || p.code.includes(imgSearch)
    );

    return (
      <div>
        {/* 密碼彈窗 */}
        {!adminAuthed && (
          <div className="modal-mask">
            <div className="modal-card">
              <h3>🔒 內部後台</h3>
              <p>請輸入後台密碼才能繼續</p>
              <input
                className="modal-input" type="password" placeholder="密碼"
                value={adminPwInput} autoFocus
                onChange={e => { setAdminPwInput(e.target.value); setAdminPwError(""); }}
                onKeyDown={e => { if (e.key === "Enter") handleAdminLogin(); }}
              />
              {adminPwError && <div className="login-error">{adminPwError}</div>}
              <button className="submit-btn" onClick={handleAdminLogin}>進入後台</button>
              <button className="ghost-btn" style={{width:"100%", marginTop:8}} onClick={resetLogin}>取消，返回登入</button>
            </div>
          </div>
        )}

        {/* 上傳中遮罩 */}
        {uploadingProduct && (
          <div className="uploading-mask">
            <div style={{fontSize:28}}>⏳</div>
            <div>圖片處理中，請稍候…</div>
          </div>
        )}

        <div className="app-header">
          <span className="who"><b>內部後台</b></span>
          {/* 分頁切換 */}
          <div style={{display:"flex", gap:4, marginLeft:16}}>
            {[["orders","📋 訂單管理"],["images","🖼 商品圖片"]].map(([key, label]) => (
              <button key={key}
                style={{padding:"6px 14px", fontSize:13, borderRadius:6, border:"1px solid var(--line)",
                  background: adminTab === key ? "var(--brand)" : "#fff",
                  color: adminTab === key ? "#fff" : "var(--ink-soft)", cursor:"pointer"}}
                onClick={() => setAdminTab(key)}>{label}</button>
            ))}
          </div>
          <button className="logout-link" style={{marginLeft:"auto"}} onClick={() => { if (adminTab==="orders") loadOrders(); }}>重新整理</button>
          <button className="logout-link" style={{marginLeft:8}} onClick={handleAdminLogout}>登出</button>
        </div>

        <div className="admin-wrap">

          {/* ===== 訂單管理分頁 ===== */}
          {adminTab === "orders" && (
            <React.Fragment>
              <div className="admin-stats">
                <div className="stat-card"><div className="label">篩選後訂單數</div><div className="value">{adminStats.count}</div></div>
                <div className="stat-card"><div className="label">合計金額</div><div className="value">${adminStats.total.toLocaleString()}</div></div>
                <div className="stat-card"><div className="label">待複核訂單</div><div className={"value" + (adminStats.reviewCount > 0 ? " warn" : "")}>{adminStats.reviewCount}</div></div>
              </div>

              <div className="admin-filters">
                <input placeholder="搜尋客戶名稱或分店代號…" value={filterCustomer} onChange={e => setFilterCustomer(e.target.value)} />
                <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                  <option value="all">全部狀態</option>
                  <option value="ok">可匯出</option>
                  <option value="review">含待複核</option>
                </select>
                <div className="filter-date-wrap">
                  <span>從</span>
                  <input type="date" value={filterDateFrom} onChange={e => setFilterDateFrom(e.target.value)} />
                  <span>到</span>
                  <input type="date" value={filterDateTo} onChange={e => setFilterDateTo(e.target.value)} />
                  {(filterDateFrom || filterDateTo) && (
                    <button className="ghost-btn" style={{padding:"5px 10px", fontSize:12}} onClick={() => { setFilterDateFrom(""); setFilterDateTo(""); }}>清除</button>
                  )}
                </div>
              </div>

              {filteredOrders.length > 0 && (
                <div className="batch-bar">
                  <span>{checkedList.length > 0 ? `已勾選 ${checkedList.length} 筆` : `共 ${filteredOrders.length} 筆訂單`}</span>
                  <button onClick={exportBatch}>{checkedList.length > 0 ? `匯出已勾選（${checkedList.length}）` : "全部匯出 Excel"}</button>
                </div>
              )}

              {pageError && <div className="login-error">{pageError}</div>}
              {loading ? (
                <p style={{color:"var(--ink-soft)", fontSize:14}}>載入中…</p>
              ) : filteredOrders.length === 0 ? (
                <p style={{color:"var(--ink-soft)", fontSize:14}}>
                  {orders.length === 0 ? "目前尚無訂單，客戶下單後會顯示在這裡。" : "目前篩選條件下沒有符合的訂單。"}
                </p>
              ) : (
                <table className="admin-table">
                  <thead>
                    <tr>
                      <th style={{width:36}}><input type="checkbox" checked={allChecked} onChange={toggleAll} /></th>
                      <th>訂單編號</th><th>客戶</th><th>分店代號</th><th>時間</th><th>品項數</th><th>金額</th><th>狀態</th><th></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredOrders.map(o => (
                      <tr key={o.orderId} style={checkedOrders[o.orderId] ? {background:"#f0f7f5"} : {}}>
                        <td><input type="checkbox" checked={!!checkedOrders[o.orderId]} onChange={() => toggleCheck(o.orderId)} /></td>
                        <td style={{fontFamily:"monospace", fontSize:12}}>{o.orderId}</td>
                        <td>{o.customerName}</td>
                        <td style={{fontSize:12, color:"var(--ink-soft)"}}>{o.branchCode}</td>
                        <td style={{fontSize:12}}>{o.time}</td>
                        <td>{o.lines.length}</td>
                        <td>${o.total.toLocaleString()}</td>
                        <td>{o.needsReview ? <span className="pill-status review">含待複核</span> : <span className="pill-status ok">可匯出</span>}</td>
                        <td><button className="download-btn" style={{padding:"6px 12px", fontSize:12}} onClick={() => exportExcel(o)}>下載</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </React.Fragment>
          )}

          {/* ===== 商品圖片分頁 ===== */}
          {adminTab === "images" && (
            <React.Fragment>
              <p style={{fontSize:13, color:"var(--ink-soft)", marginBottom:14}}>
                點擊「＋ 上傳」新增圖片；同一商品可有多張，點縮圖右上角 ✕ 刪除。圖片儲存在 Google Drive，即時同步至客戶端。
              </p>
              {products.length === 0 ? (
                <div style={{color:"var(--ink-soft)", fontSize:14}}>
                  尚未載入商品資料。請先以客戶身分登入一次，商品清單才會快取到後台。
                </div>
              ) : (
                <React.Fragment>
                  <div className="img-search-bar">
                    <input placeholder="搜尋品名或品號…" value={imgSearch} onChange={e => setImgSearch(e.target.value)} />
                    <span style={{fontSize:13, color:"var(--ink-soft)", whiteSpace:"nowrap", alignSelf:"center"}}>
                      {imgProducts.length} 項商品
                    </span>
                  </div>
                  {imgProducts.map(p => (
                    <div key={p.code} className="product-img-row">
                      <div className="pinfo">
                        <div className="pcode">{p.code}</div>
                        <div className="pname">{p.name}</div>
                      </div>
                      <div className="img-grid" style={{margin:0}}>
                        {(p.images || []).map((url, idx) => (
                          <div key={idx} className="img-thumb">
                            <img src={url} alt="" loading="lazy" onClick={() => openLightbox(p.images, idx, p.name)} style={{cursor:"pointer"}} />
                            <button className="del-btn" onClick={() => handleImageDelete(p.code, url)}>✕</button>
                          </div>
                        ))}
                        {/* 上傳按鈕 */}
                        <div className="img-upload-btn" onClick={() => {
                          setUploadingProduct(p.code);
                          fileInputRef.current && fileInputRef.current.click();
                        }}>
                          <span>＋</span>上傳
                        </div>
                      </div>
                    </div>
                  ))}
                </React.Fragment>
              )}
            </React.Fragment>
          )}
        </div>

        {/* 燈箱（後台也能預覽） */}
        {lightbox && (
          <div className="lightbox-mask" onClick={closeLightbox}>
            <div className="lightbox-inner" onClick={e => e.stopPropagation()}>
              <button className="lightbox-close" onClick={closeLightbox}>✕</button>
              {lightbox.images.length > 1 && <button className="lightbox-btn" onClick={lightboxPrev}>‹</button>}
              <img src={lightbox.images[lightbox.index]} alt={lightbox.productName} />
              {lightbox.images.length > 1 && <button className="lightbox-btn" onClick={lightboxNext}>›</button>}
              {lightbox.images.length > 1 && (
                <div className="lightbox-dots">
                  {lightbox.images.map((_, i) => (
                    <span key={i} className={i === lightbox.index ? "active" : ""} onClick={() => setLightbox(lb => ({...lb, index:i}))} />
                  ))}
                </div>
              )}
            </div>
          </div>
        )}

        {/* 隱藏 file input */}
        <input type="file" accept="image/*" style={{display:"none"}} ref={fileInputRef}
          onChange={e => {
            const file = e.target.files[0];
            if (file && uploadingProduct) handleImageUpload(uploadingProduct, file);
            e.target.value = "";
          }}
        />
      </div>
    );
  }

  // ---------------- 訂單完成畫面 ----------------
  if (stage === "confirmed" && lastOrder) {
    return (
      <div className="confirm-wrap">
        <div className="badge">✓</div>
        <h2>訂單已送出</h2>
        <p>
          {lastOrder.customer} 您好，我們已收到您的訂單。
          {lastOrder.needsReview && "其中含有特殊促銷條件的品項，將由業務人員複核後正式確認金額，"}
          如有問題會主動與您聯繫。
        </p>
        <div className="order-id">訂單編號 {lastOrder.id}</div>
        <div>
          <button className="ghost-btn" onClick={() => { setStage("shop"); }}>返回繼續選購</button>
        </div>
      </div>
    );
  }

  // ---------------- 購物畫面 ----------------
  return (
    <div>
      <div className="app-header">
        <span className="who">客戶：<b>{customer.name}</b>{customer.branchName !== customer.name && <span style={{color:"var(--ink-soft)"}}>（{customer.branchName}）</span>}</span>
        <div className="search-box">
          <input
            placeholder="搜尋品名或產品編號…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
        <button className="cart-pill" onClick={() => setDrawerOpen(true)}>
          🛒 購物車 {cartCount > 0 && `(${cartCount})`}
        </button>
        <button className="logout-link" onClick={resetLogin}>登出</button>
      </div>

      <div className="layout">
        <div className="sidebar">
          {categories.map(cat => {
            const n = cat === "全部" ? products.length : products.filter(p => p.category === cat).length;
            return (
              <button key={cat} className={activeCat === cat ? "active" : ""} onClick={() => setActiveCat(cat)}>
                {cat}<span className="count">{n}</span>
              </button>
            );
          })}
        </div>

        <div className="main">
          <h2>{activeCat}　共 {filtered.length} 項商品</h2>
          <div className="grid">
            {filtered.map(p => {
              const rule = parseActivity(p.activity);
              const qty = cart[p.code] || 0;
              const calc = computeLine(p, qty);
              const imgs = p.images || [];
              return (
                <div key={p.code} className={"card" + (p.discontinued ? " disabled" : "")}>
                  {/* 圖片區 */}
                  <div
                    className="card-img-wrap"
                    onClick={() => imgs.length > 0 && openLightbox(imgs, 0, p.name)}
                    style={imgs.length === 0 ? {cursor:"default"} : {}}
                  >
                    {imgs.length > 0
                      ? <img src={imgs[0]} alt={p.name} loading="lazy" />
                      : <div className="card-img-placeholder">📦</div>
                    }
                    {imgs.length > 1 && <div className="card-img-count">1/{imgs.length}</div>}
                  </div>

                  <div className="code">{p.code}</div>
                  <div className="name">{p.name}</div>
                  <div className="price-row">
                    <span className="unit-price">${p.unitPrice}</span>
                    {p.listPrice && <span className="list-price">${p.listPrice}</span>}
                  </div>
                  <div className="box-qty">每箱 {p.boxQty} 入</div>

                  {rule && rule.type === "autoGift" && <span className="tag gift">{rule.label}</span>}
                  {rule && rule.type === "autoBox" && <span className="tag box">{rule.label}</span>}
                  {rule && rule.type === "needReview" && <span className="tag review">⚠ {rule.label}・待複核</span>}
                  {p.note === "停產" && <span className="tag stop">已停產</span>}

                  <div className="qty-row">
                    <button onClick={() => setQty(p.code, qty - 1)}>－</button>
                    <input type="number" min="0" value={qty} onChange={e => setQty(p.code, Number(e.target.value) || 0)} />
                    <button onClick={() => setQty(p.code, qty + 1)}>＋</button>
                    {qty > 0 && calc.giftQty > 0 && <span className="added">送{calc.giftQty}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {drawerOpen && (
        <React.Fragment>
          <div className="drawer-mask" onClick={() => setDrawerOpen(false)} />
          <div className="drawer">
            <div className="drawer-head">
              <h3>購物車</h3>
              <button onClick={() => setDrawerOpen(false)}>✕</button>
            </div>
            <div className="drawer-body">
              {cartLines.length === 0 ? (
                <div className="empty-cart">購物車是空的，請先選購商品</div>
              ) : cartLines.map(l => (
                <div className="cart-line" key={l.product.code}>
                  <div className="info">
                    <div className="name">{l.product.name}</div>
                    <div className="meta">
                      {l.qty} 件 × ${l.product.unitPrice}
                      {l.giftQty > 0 && `　送 ${l.giftQty} 件`}
                      {l.flag && l.flag !== "review" && `　${l.flag}`}
                      {l.flag === "review" && <span style={{color:"var(--warn)"}}>　⚠待業務複核</span>}
                    </div>
                    <button className="remove" onClick={() => setQty(l.product.code, 0)}>移除</button>
                  </div>
                  <div className="lineprice">${l.amount.toLocaleString()}</div>
                </div>
              ))}
            </div>
            <div className="drawer-foot">
              <div className="total-row grand">
                <span>合計</span>
                <span>${cartTotal.toLocaleString()}</span>
              </div>
              {hasReviewItem && (
                <div className="review-note">
                  此訂單含有規則較特殊的促銷品項（例如：促銷活動、合清價等），系統試算金額僅供參考，正式金額將由業務人員複核後確認。
                </div>
              )}
              {pageError && <div className="login-error">{pageError}</div>}
              <button className="submit-btn" disabled={cartLines.length === 0 || submitting} onClick={submitOrder}>
                {submitting ? "送出中…" : "送出訂單"}
              </button>
            </div>
          </div>
        </React.Fragment>
      )}

      {/* 燈箱 */}
      {lightbox && (
        <div className="lightbox-mask" onClick={closeLightbox}>
          <div className="lightbox-inner" onClick={e => e.stopPropagation()}>
            <button className="lightbox-close" onClick={closeLightbox}>✕</button>
            {lightbox.images.length > 1 && (
              <button className="lightbox-btn" onClick={lightboxPrev}>‹</button>
            )}
            <img src={lightbox.images[lightbox.index]} alt={lightbox.productName} />
            {lightbox.images.length > 1 && (
              <button className="lightbox-btn" onClick={lightboxNext}>›</button>
            )}
            {lightbox.images.length > 1 && (
              <div className="lightbox-dots">
                {lightbox.images.map((_, i) => (
                  <span key={i} className={i === lightbox.index ? "active" : ""}
                    onClick={() => setLightbox(lb => ({ ...lb, index: i }))} />
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* 隱藏 file input，由後台圖片上傳按鈕觸發 */}
      <input
        type="file" accept="image/*" style={{display:"none"}}
        ref={fileInputRef}
        onChange={e => {
          const file = e.target.files[0];
          if (file && uploadingProduct) handleImageUpload(uploadingProduct, file);
          e.target.value = "";
        }}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
