<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>業務訂購系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  /* ── Shopify-style 設計令牌 ── */
  :root{
    --ink:#1a1a1a; --ink-soft:#6d7175; --ink-xsoft:#8c9196;
    --line:#e1e3e5; --paper:#f6f6f7; --panel:#ffffff;
    --brand:#2f6f5e; --brand-dark:#1f4d40; --brand-tint:#e9f5f2;
    --warn:#b98900; --warn-tint:#fff5cc;
    --danger:#d72c0d; --danger-tint:#fff4f4;
    --radius:8px; --radius-lg:12px;
    --shadow-sm:0 1px 3px rgba(0,0,0,.08);
    --shadow-md:0 4px 12px rgba(0,0,0,.1);
    --header-h:88px; --header-h-mobile:96px; --header-h-mobile-cat:140px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
  #root{min-height:100vh;}
  /* ── 登入頁 ── */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper);}
  .login-card{width:100%;max-width:400px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);padding:36px 32px;box-shadow:var(--shadow-md);}
  .login-card h1{font-size:22px;font-weight:700;margin:0 0 6px;letter-spacing:-.02em;text-align:center;}
  .login-card p.sub{color:var(--ink-soft);font-size:14px;margin:0 0 24px;line-height:1.5;text-align:center;}
  .taxid-input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:var(--radius);font-size:18px;letter-spacing:.1em;margin-bottom:12px;transition:border-color .2s;}
  .taxid-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(47,111,94,.12);}
  .login-error{font-size:13px;color:var(--danger);background:var(--danger-tint);padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;line-height:1.5;border-left:3px solid var(--danger);}
  .confirm-box{border:1px solid #c8e6df;background:var(--brand-tint);border-radius:var(--radius);padding:16px;margin-bottom:18px;}
  .confirm-row{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:5px 0;}
  .confirm-row span{color:var(--ink-soft);}
  .confirm-row b{color:var(--brand-dark);font-weight:600;}
  .branch-list{margin-bottom:16px;max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .branch-btn{display:block;width:100%;text-align:left;padding:13px 16px;border:1.5px solid var(--line);background:#fff;border-radius:var(--radius);font-size:14px;cursor:pointer;transition:all .15s;}
  .branch-btn:hover{border-color:var(--brand);background:var(--brand-tint);}
  .branch-btn.active{border-color:var(--brand);background:var(--brand-tint);font-weight:600;}
  .submit-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;letter-spacing:.02em;transition:background .15s;}
  .submit-btn:hover{background:var(--brand-dark);}
  .submit-btn:disabled{background:#b5c4c1;cursor:not-allowed;}
  .ghost-btn{padding:11px 22px;background:#fff;border:1.5px solid var(--line);border-radius:var(--radius);font-size:14px;cursor:pointer;margin-top:8px;transition:border-color .15s,background .15s;}
  .ghost-btn:hover{border-color:var(--brand);background:var(--brand-tint);}

  /* ── Header（桌機：單行 / 手機：雙行）── */
  .app-header{
    position:sticky;top:0;z-index:20;
    background:var(--panel);border-bottom:1px solid var(--line);
    box-shadow:0 1px 4px rgba(0,0,0,.06);
    padding:0 20px;
    display:grid;
    grid-template-columns:1fr auto;
    grid-template-rows:auto auto;
    grid-template-areas:"who actions" "searchbar searchbar";
    gap:0 12px;
    height:auto;
  }
  /* 桌機：searchbar 佔滿第二行 */
  .header-searchbar{
    grid-area:searchbar;
    display:flex;align-items:center;gap:8px;
    padding:6px 0 10px;
    min-width:0;
  }
  .header-searchbar .header-search{flex:1;}
  .header-who{grid-area:who;display:flex;align-items:center;min-width:0;padding:10px 0 4px;}
  .header-who .company{font-size:18px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .header-who .branch{display:none;}
  .header-search{flex:1;position:relative;}
  .header-search input{width:100%;padding:9px 14px 9px 36px;border:1.5px solid var(--line);border-radius:20px;font-size:14px;background:#f6f6f7;transition:all .2s;}
  @media(max-width:760px){.header-search input{font-size:16px;}}
  .header-search input:focus{outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(47,111,94,.1);}
  .header-search .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:14px;pointer-events:none;}
  .header-actions{grid-area:actions;display:flex;align-items:center;gap:8px;flex-shrink:0;padding:10px 0 4px;}
  .header-sort{padding:8px 12px;border:1.5px solid var(--line);border-radius:var(--radius);font-size:13px;background:#fff;cursor:pointer;color:var(--ink-soft);}
  .header-sort:focus{outline:none;border-color:var(--brand);}
  .btn-orders{display:flex;align-items:center;gap:5px;padding:8px 14px;border:1.5px solid var(--line);border-radius:var(--radius);font-size:13px;background:#fff;cursor:pointer;color:var(--ink-soft);white-space:nowrap;transition:all .15s;}
  .btn-orders:hover{border-color:var(--brand);color:var(--brand-dark);background:var(--brand-tint);}
  .cart-pill{display:flex;align-items:center;gap:6px;background:var(--brand);color:#fff;border:none;border-radius:var(--radius);padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap;}
  .cart-label{font-size:13px;}
  @media(max-width:760px){.cart-label{font-size:12px;}}
  .cart-pill:hover{background:var(--brand-dark);}
  .cart-badge{background:#fff;color:var(--brand-dark);border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700;}
  .logout-link{font-size:12px;color:var(--ink-soft);background:none;border:none;cursor:pointer;padding:4px;white-space:nowrap;}
  .logout-link:hover{color:var(--ink);}

  /* ── 版面 ── */
  .layout{display:flex;max-width:1280px;margin:0 auto;}

  /* ── Header 分類列（手機專用，嵌在 header 內）── */
  .header-cats{display:none;}

  /* ── Sidebar ── */
  /* 桌機：sidebar 內的 row1/row2 不需要，只用 desktop-tree */
  .sidebar-row1,.sidebar-row2{display:none;}
  .sidebar-desktop-tree{display:block;}
  .sidebar{
    width:200px;flex-shrink:0;
    padding:20px 12px;
    border-right:1px solid var(--line);
    position:sticky;top:var(--header-h);
    align-self:flex-start;
    height:calc(100vh - var(--header-h));
    overflow-y:auto;
    background:var(--panel);
  }
  .sidebar-section-title{font-size:11px;font-weight:700;color:var(--ink-xsoft);letter-spacing:.08em;text-transform:uppercase;padding:4px 8px 8px;margin-top:12px;}
  .sidebar-all{display:block;width:100%;text-align:left;padding:9px 10px;border:none;background:none;border-radius:var(--radius);font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:all .15s;}
  .sidebar-all:hover{background:#f3f4f6;}
  .sidebar-all.active{background:var(--brand-tint);color:var(--brand-dark);}
  .sidebar-parent-btn{display:flex;width:100%;align-items:center;padding:9px 10px 7px;border:none;background:none;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;border-radius:var(--radius);gap:4px;transition:background .15s;}
  .sidebar-parent-btn:hover{background:#f3f4f6;}
  .sidebar-parent-btn .arrow{font-size:9px;color:var(--ink-xsoft);transition:transform .2s;margin-left:auto;}
  .sidebar-parent-btn .arrow.open{transform:rotate(90deg);}
  .sidebar-children{margin-bottom:4px;}
  .sidebar-child{display:block;width:100%;text-align:left;padding:7px 10px 7px 20px;border:none;background:none;border-radius:var(--radius);font-size:13px;color:var(--ink-soft);cursor:pointer;transition:all .15s;}
  .sidebar-child:hover{background:#f3f4f6;color:var(--ink);}
  .sidebar-child.active{background:var(--brand-tint);color:var(--brand-dark);font-weight:600;}
  .sidebar .count{float:right;color:var(--ink-xsoft);font-size:11px;background:#f0f0f0;padding:1px 6px;border-radius:10px;}
  .sidebar-child.active .count{background:rgba(47,111,94,.15);}

  /* ── 商品主區 ── */
  .main{flex:1;padding:20px 24px 100px;min-width:0;}
  .main-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .main-title{font-size:16px;font-weight:700;color:var(--ink);margin:0;}
  .main-count{font-size:13px;color:var(--ink-soft);}

  /* ── 商品卡片（Shopify 風格）── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(200px,1fr));gap:16px;}
  .card{
    background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius-lg);
    padding:0;display:flex;flex-direction:column;
    overflow:hidden;
    box-shadow:var(--shadow-sm);
    transition:box-shadow .2s,transform .2s;
  }
  .card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .card-body{padding:12px 14px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .card .code{font-size:11px;color:var(--ink-xsoft);letter-spacing:.04em;font-family:monospace;}
  .card .name{font-size:13px;font-weight:600;line-height:1.45;color:var(--ink);min-height:36px;}
  .card .price-row{display:flex;align-items:baseline;gap:6px;margin-top:2px;}
  .card .unit-price{font-size:17px;font-weight:800;color:var(--brand-dark);}
  .card .list-price{font-size:11px;color:var(--ink-xsoft);text-decoration:line-through;}
  .card .box-qty{font-size:11px;color:var(--ink-soft);}
  .tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;width:fit-content;letter-spacing:.02em;}
  .tag.gift{background:var(--brand-tint);color:var(--brand-dark);}
  .tag.box{background:#e8eaf6;color:#3949ab;}
  .tag.review{background:var(--warn-tint);color:var(--warn);}
  .tag.stop{background:var(--danger-tint);color:var(--danger);}
  .qty-row{display:flex;align-items:center;gap:0;padding:10px 14px;border-top:1px solid var(--line);background:#fafafa;margin-top:auto;touch-action:manipulation;}
  .qty-btn{width:32px;height:32px;border:1.5px solid var(--line);background:#fff;border-radius:var(--radius);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:500;transition:all .15s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  .qty-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-tint);}
  .qty-input{flex:1;text-align:center;padding:6px 4px;border:1.5px solid var(--line);border-radius:var(--radius);font-size:14px;font-weight:600;margin:0 6px;min-width:0;}
  .qty-input:focus{outline:none;border-color:var(--brand);}
  .qty-row .added{font-size:11px;color:var(--brand-dark);font-weight:600;margin-left:8px;white-space:nowrap;}
  .card.disabled{opacity:.5;pointer-events:none;}
  .card.disabled .qty-row{background:#f5f5f5;}
  /* 商品卡片圖片：支援滑動 */
  .card-img-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#f4f6f5;border-radius:6px;overflow:hidden;touch-action:pan-y;}
  .card-img-slider{display:flex;width:100%;height:100%;transition:transform .25s ease;will-change:transform;}
  .card-img-slider img{width:100%;height:100%;object-fit:contain;flex-shrink:0;display:block;pointer-events:none;user-select:none;}
  .card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#c8d0ce;}
  .card-img-dots{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);display:flex;gap:5px;pointer-events:none;}
  .card-img-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);transition:background .2s;}
  .card-img-dots span.active{background:#fff;}
  /* 桌機左右箭頭 */
  .card-img-arrow{
    position:absolute;top:50%;transform:translateY(-50%);
    background:rgba(0,0,0,.32);color:#fff;border:none;
    width:28px;height:28px;border-radius:50%;
    font-size:14px;cursor:pointer;display:none;
    align-items:center;justify-content:center;
    transition:background .15s;z-index:2;
  }
  .card-img-arrow:hover{background:rgba(0,0,0,.55);}
  .card-img-arrow.prev{left:5px;}
  .card-img-arrow.next{right:5px;}
  .card-img-wrap:hover .card-img-arrow{display:flex;}
  @media(hover:none){.card-img-arrow{display:none!important;}}
  .card-img-count{position:absolute;bottom:5px;right:7px;background:rgba(0,0,0,.45);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;}
  .lightbox-mask{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;padding:20px;}
  .lightbox-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;gap:12px;}
  .lightbox-inner img{max-width:80vw;max-height:82vh;object-fit:contain;border-radius:6px;}
  .lightbox-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .lightbox-close{position:absolute;top:-44px;right:0;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;}
  .lightbox-dots{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
  .lightbox-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;}
  .lightbox-dots span.active{background:#fff;}
  .drawer-mask{position:fixed;inset:0;background:rgba(20,30,28,.35);z-index:30;}
  .drawer{position:fixed;top:0;right:0;width:min(420px,100vw);height:100vh;background:var(--panel);z-index:31;display:flex;flex-direction:column;box-shadow:-8px 0 24px rgba(0,0,0,.08);}
  .drawer-head{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
  .drawer-head h3{margin:0;font-size:16px;}
  .drawer-head button{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);}
  .drawer-body{flex:1;overflow-y:auto;padding:12px 18px;}
  .cart-line{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);}
  .cart-line .info{flex:1;min-width:0;}
  .cart-line .name{font-size:13px;line-height:1.4;}
  .cart-line .meta{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .cart-line .remove{background:none;border:none;color:var(--danger);font-size:12px;cursor:pointer;padding:0;text-decoration:underline;}
  .cart-line .lineprice{font-size:13px;font-weight:600;white-space:nowrap;}
  .drawer-foot{border-top:1px solid var(--line);padding:16px 18px;}
  .total-row{display:flex;justify-content:space-between;font-size:15px;margin-bottom:4px;}
  .total-row.grand{font-size:18px;font-weight:700;margin-top:8px;}
  .review-note{font-size:12px;color:var(--warn);background:var(--warn-tint);padding:8px 10px;border-radius:6px;margin:10px 0;line-height:1.5;}
  .empty-cart{text-align:center;color:var(--ink-soft);padding:60px 20px;font-size:14px;}
  .confirm-wrap{max-width:560px;margin:60px auto;padding:0 20px;text-align:center;}
  .confirm-wrap .badge{width:56px;height:56px;border-radius:50%;background:var(--brand-tint);color:var(--brand-dark);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
  .confirm-wrap h2{margin:0 0 8px;}
  .confirm-wrap p{color:var(--ink-soft);font-size:14px;line-height:1.7;}
  .order-id{display:inline-block;background:var(--brand-tint);color:var(--brand-dark);padding:6px 14px;border-radius:6px;font-family:monospace;font-size:13px;margin:8px 0 20px;}
  /* 兩層分類側邊欄 */
  .sidebar-all{display:block;width:100%;text-align:left;padding:9px 10px;border:none;background:none;border-radius:6px;font-size:14px;color:var(--ink-soft);cursor:pointer;font-weight:700;}
  .sidebar-all.active{background:var(--brand-tint);color:var(--brand-dark);}
  .sidebar-parent-btn{display:flex;width:100%;text-align:left;padding:8px 10px 6px;margin-top:2px;border:none;background:none;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;border-radius:6px;align-items:center;gap:4px;}
  .sidebar-parent-btn:hover{background:#f0f4f3;}
  .sidebar-parent-btn .arrow{font-size:10px;color:var(--ink-soft);transition:transform .15s;margin-left:auto;}
  .sidebar-parent-btn .arrow.open{transform:rotate(90deg);}
  .sidebar-children{padding-left:12px;}
  .sidebar-child{display:block;width:100%;text-align:left;padding:6px 8px;border:none;background:none;border-radius:6px;font-size:13px;color:var(--ink-soft);cursor:pointer;}
  .sidebar-child:hover{background:var(--brand-tint);}
  .sidebar-child.active{background:var(--brand-tint);color:var(--brand-dark);font-weight:600;}
  /* 歷史訂單查詢 */
  .history-wrap{max-width:660px;margin:32px auto;padding:0 20px;}
  .history-wrap h2{font-size:17px;margin:0 0 16px;}
  .order-query-box{display:flex;gap:8px;margin-bottom:20px;}
  .order-query-box input{flex:1;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:16px;letter-spacing:.06em;}
  .order-query-box button{padding:11px 20px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;white-space:nowrap;}
  .history-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;}
  .history-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
  .history-head:hover{background:#f7fbfa;}
  .history-meta{flex:1;min-width:0;}
  .history-id{font-family:monospace;font-size:12px;color:var(--ink-soft);}
  .history-info{font-size:13px;margin-top:2px;}
  .history-total{font-weight:700;font-size:14px;white-space:nowrap;}
  .history-badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;}
  .history-badge.done{background:var(--brand-tint);color:var(--brand-dark);}
  .history-badge.pending{background:var(--warn-tint);color:var(--warn);}
  .history-chevron{color:var(--ink-soft);font-size:11px;transition:transform .2s;}
  .history-chevron.open{transform:rotate(90deg);}
  .history-body{border-top:1px solid var(--line);padding:10px 16px;}
  .history-line{display:flex;gap:8px;align-items:baseline;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line);}
  .history-line:last-child{border-bottom:none;}
  .history-line .lcode{color:var(--ink-soft);font-size:11px;font-family:monospace;white-space:nowrap;}
  .history-line .lname{flex:1;min-width:0;}
  .history-line .lqty{color:var(--ink-soft);white-space:nowrap;font-size:12px;}
  .history-line .lamt{font-weight:600;white-space:nowrap;}
  .history-foot{display:flex;justify-content:flex-end;padding-top:8px;font-size:14px;font-weight:700;border-top:1px solid var(--line);margin-top:4px;}
  /* 訂單狀態 badge */
  .order-badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:10px;font-weight:600;white-space:nowrap;}
  .order-badge.unconfirmed{background:var(--warn-tint);color:var(--warn);}
  .order-badge.preparing{background:#eef1fb;color:#3d4f9e;}
  .order-badge.shipped{background:var(--brand-tint);color:var(--brand-dark);}
  /* 訂單操作按鈕列 */
  .order-action-bar{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
  .btn-modify{padding:7px 16px;background:#eef1fb;color:#3d4f9e;border:1px solid #d0d8f5;border-radius:7px;font-size:13px;cursor:pointer;}
  .btn-cancel-order{padding:7px 16px;background:var(--danger-tint);color:var(--danger);border:1px solid #eacfca;border-radius:7px;font-size:13px;cursor:pointer;}
  .order-note-box{margin-top:8px;padding:8px 12px;background:#fffbf3;border:1px solid #e8d9b5;border-radius:6px;font-size:12px;color:#7a6030;}
  /* 訂單編輯模式 */

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect, useRef } = React;
const GAS_URL = "https://script.google.com/macros/s/AKfycby48Nyzb4q5265opAIWwRGTdBFlnYnsa-0lS9w0EIGAaRVCNBYqvd9Wc5Hip2DySgEiwQ/exec";
const LS_CUSTOMER = "order_customer";
const LS_PRODUCTS  = "order_products";
const LS_CART      = "order_cart";
const LS_VERSION   = "order_cache_v2";
const IDLE_MINUTES = 30;

// 啟動時檢查快取版本，舊版自動清除
(function() {
  if (localStorage.getItem("order_cache_ver") !== LS_VERSION) {
    localStorage.removeItem(LS_CUSTOMER);
    localStorage.removeItem(LS_PRODUCTS);
    localStorage.removeItem("cat_tree");
    localStorage.setItem("order_cache_ver", LS_VERSION);
  }
})();

async function callGAS(action, payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    redirect: "follow",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify(Object.assign({action}, payload))
  });
  const text = await res.text();
  if (text.trim().startsWith("<")) {
    throw new Error("GAS 回傳非 JSON（可能需要重新部署）：" + text.substring(0,80));
  }
  const data = JSON.parse(text);
  if (!data.ok) throw new Error(data.error || "後端回應失敗");
  return data;
}
// Google Drive 圖片網址正規化：統一轉成 thumbnail 格式避免 uc?export=view 被封鎖
// UTC 或 GAS 時間字串統一轉台灣時間格式
function formatTime(t) {
  if (!t) return "";
  try {
    const s = String(t);
    // GAS 寫入格式 "2026-06-23 17:29:39"，不含 T，直接顯示
    if (!s.includes("T") && !s.includes("Z")) return s;
    // ISO UTC 格式，轉台灣時間
    const d = new Date(s);
    if (isNaN(d)) return s;
    return d.toLocaleString("zh-TW", {timeZone:"Asia/Taipei", year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false});
  } catch(e) { return String(t); }
}

function fixImgUrl(url) {
  if (!url) return url;
  // 已經是 thumbnail 格式就不動
  if (url.includes('thumbnail')) return url;
  // uc?export=view&id=XXX → thumbnail?id=XXX&sz=w400
  var m = url.match(/[?&]id=([^&]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w400';
  return url;
}

// ── 商品圖片滑動元件 ──
function ImageSlider({ images }) {
  const [idx, setIdx] = React.useState(0);
  const touchStartX = React.useRef(null);
  const touchStartY = React.useRef(null);
  const isDragging  = React.useRef(false);

  const [validImgs, setValidImgs] = React.useState(images);
  React.useEffect(() => { setValidImgs(images); }, [images.join(',')]);
  function onImgError(url) { setValidImgs(prev => prev.filter(u => u !== url)); }

  if (!images || images.length === 0 || validImgs.length === 0) {
    return <div className="card-img-wrap"><div className="card-img-placeholder">📦</div></div>;
  }

  const hasMult = images.length > 1;

  function prev(e) { e.stopPropagation(); setIdx(i => (i - 1 + images.length) % images.length); }
  function next(e) { e.stopPropagation(); setIdx(i => (i + 1) % images.length); }

  function onTouchStart(e) {
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
    isDragging.current  = false;
  }
  function onTouchMove(e) {
    if (touchStartX.current === null) return;
    const dx = e.touches[0].clientX - touchStartX.current;
    const dy = e.touches[0].clientY - touchStartY.current;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      isDragging.current = true;
      e.preventDefault();
    }
  }
  function onTouchEnd(e) {
    if (!isDragging.current || touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    if (dx < -30) setIdx(i => Math.min(i + 1, images.length - 1));
    if (dx >  30) setIdx(i => Math.max(i - 1, 0));
    touchStartX.current = null;
    isDragging.current  = false;
  }

  return (
    <div className="card-img-wrap"
      onTouchStart={onTouchStart}
      onTouchMove={onTouchMove}
      onTouchEnd={onTouchEnd}
    >
      <div className="card-img-slider" style={{transform:`translateX(${-idx*100}%)`}}>
        {validImgs.map((url, i) => <img key={url} src={url} alt="" loading={i===0?"eager":"lazy"} onError={()=>onImgError(url)}/>)}
      </div>
      {hasMult && <button className="card-img-arrow prev" onClick={prev}>‹</button>}
      {hasMult && <button className="card-img-arrow next" onClick={next}>›</button>}
      {hasMult && (
        <div className="card-img-dots">
          {validImgs.map((_, i) => <span key={i} className={i===idx?"active":""}/>)}
        </div>
      )}
    </div>
  );
}

function parseActivity(a) {
  if (!a) return null; a = a.trim();
  const bm = a.match(/成箱\$?(\d+)/); if (bm) return {type:"autoBox", boxPrice:Number(bm[1]), label:`整箱 $${bm[1]}`};
  const gm = a.match(/^(\d+)\+(\d+)$/); if (gm) return {type:"autoGift", buy:Number(gm[1]), free:Number(gm[2]), label:`買${gm[1]}送${gm[2]}`};
  return {type:"needReview", label:a};
}
function computeLine(p, qty) {
  const rule = parseActivity(p.activity);
  let giftQty=0, amount=qty*p.unitPrice, flag=null;
  if (rule && rule.type==="autoGift" && qty>0) { giftQty = Math.floor(qty/rule.buy)*rule.free; }
  else if (rule && rule.type==="autoBox" && qty>0) { const boxes=Math.ceil(qty/(Number(p.boxQty)||1)); amount=boxes*rule.boxPrice; flag=`依整箱價，共 ${boxes} 箱`; }
  else if (rule && rule.type==="needReview") { flag="review"; }
  return {giftQty, amount, rule, flag};
}

// ── 新促銷活動計算 ──
function calcPromoGifts(cartItems, promos, products) {
  // cartItems: [{product, qty, ...}]
  // promos: 有效促銷活動（已按優先權排序）
  // products: 全部商品（查品名用）
  const productMap = {};
  products.forEach(p => { productMap[p.code] = p; });
  const giftLines = [];

  promos.forEach(promo => {
    const triggerAll = promo.triggerCodes === "全部";
    const triggerSet = triggerAll ? null : promo.triggerCodes.split(",").map(c=>c.trim()).filter(Boolean);

    // 找出觸發的購物車品項
    const triggered = cartItems.filter(item =>
      !triggerSet || triggerSet.includes(item.product.code)
    );
    if (triggered.length === 0) return;

    const totalQty = triggered.reduce((s, item) => s + item.qty, 0);
    let giftCount = 0;

    if (promo.ruleType === "buy") {
      const groupSize = promo.triggerN + promo.giftM;
      giftCount = Math.floor(totalQty / groupSize) * promo.giftM;
    } else { // min
      giftCount = Math.floor(totalQty / promo.triggerN) * promo.giftM;
    }
    if (giftCount <= 0) return;

    let giftCodes = promo.giftCodes.split(",").map(c=>c.trim()).filter(Boolean);

    if (promo.ruleType === "buy") {
      // 贈品 = 群組內購買商品中單價最低者
      let minPrice = Infinity, minCode = "";
      triggered.forEach(item => {
        const price = parseFloat(item.product.unitPrice)||0;
        if (price < minPrice) { minPrice = price; minCode = item.product.code; }
      });
      if (minCode) giftCodes = [minCode];
    }

    giftCodes.forEach(gCode => {
      const gProduct = productMap[gCode];
      giftLines.push({
        code:      gCode,
        name:      gProduct ? gProduct.name : gCode,
        qty:       giftCount,
        giftQty:   0,
        unitPrice: 0,
        amount:    0,
        activity:  promo.name,
        isGift:    true,
        promoId:   promo.id,
      });
    });
  });
  return giftLines;
}

function App() {
  const [stage,    setStage]    = useState(() => {
    try {
      const s = JSON.parse(localStorage.getItem(LS_CUSTOMER));
      return s ? "shop" : "login";
    } catch { return "login"; }
  });
  const [customer, setCustomer] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_CUSTOMER)) || null; }
    catch { return null; }
  });
  const [products, setProducts] = useState(() => { try{return JSON.parse(localStorage.getItem(LS_PRODUCTS))||[];}catch{return [];} });
  const [promos,   setPromos]   = useState(() => { try{return JSON.parse(localStorage.getItem("promos"))||[];}catch{return [];} });
  const [loginStep, setLoginStep] = useState("input");
  const [taxIdInput, setTaxIdInput] = useState("");
  const [loginError, setLoginError] = useState("");
  const [pendingCompany, setPendingCompany] = useState(null);
  const [selectedBranchCode, setSelectedBranchCode] = useState("");
  const [loading, setLoading] = useState(false);
  const [cart, setCart] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LS_CART)) || {}; } catch { return {}; }
  });
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("default"); // default|price_asc|price_desc|code
  const [orderNote, setOrderNote] = useState(""); // 訂單備註
  // 兩層分類：activeCat = {parent:"哺育系列", child:"奶嘴"} 或 null（全部）
  const [activeCat, setActiveCat] = useState(null);
  const [openParents, setOpenParents] = useState({}); // 哪些大類展開
  const [catTree, setCatTree] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cat_tree")) || {}; } catch { return {}; }
  });
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [lastOrder, setLastOrder] = useState(null);
  const [pageError, setPageError] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  const [idleWarning, setIdleWarning] = useState(false);
  const idleTimer   = useRef(null);
  const logoutTimer = useRef(null);

  // 歷史訂單查詢
  const [hisOrders, setHisOrders]       = useState(null);
  const [hisLoading, setHisLoading]     = useState(false);
  const [hisError, setHisError]         = useState("");
  const [hisExpanded, setHisExpanded]   = useState({});
  const [hisDateFrom, setHisDateFrom]   = useState("");
  const [hisDateTo, setHisDateTo]       = useState("");
  const [hisKeyword, setHisKeyword]     = useState(""); // 品名/品號搜尋

  // 訂單前端篩選（不需要重新呼叫 GAS）
  const filteredHisOrders = useMemo(() => {
    if (!hisOrders) return [];
    return hisOrders.filter(o => {
      const dateStr = String(o.time||"").substring(0,10);
      if (hisDateFrom && dateStr < hisDateFrom) return false;
      if (hisDateTo   && dateStr > hisDateTo)   return false;
      if (hisKeyword) {
        const kw = hisKeyword.toLowerCase();
        // 搜尋訂單編號、品名、品號
        const inId   = o.orderId.toLowerCase().includes(kw);
        const inLine = o.lines.some(l =>
          String(l.code||"").toLowerCase().includes(kw) ||
          String(l.name||"").toLowerCase().includes(kw)
        );
        if (!inId && !inLine) return false;
      }
      return true;
    });
  }, [hisOrders, hisDateFrom, hisDateTo, hisKeyword]);

  // 訂單編輯狀態
  const [editingOrderId, setEditingOrderId] = useState(null); // 正在編輯哪筆
  const [editLines, setEditLines]           = useState([]);   // 編輯中的明細
  const [addItemCode, setAddItemCode]       = useState("");   // 新增品項品號
  const [addItemQty, setAddItemQty]         = useState(1);
  const [confirmModal, setConfirmModal]     = useState(null); // { type:"modify"|"cancel", orderId }
  const [editSaving, setEditSaving]         = useState(false);

  // 載入分類 tree（登入後）
  async function loadCatTree() {
    try {
      const d = await callGAS("listCategories");
      setCatTree(d.tree);
      localStorage.setItem("cat_tree", JSON.stringify(d.tree));
    } catch(e) {} // 失敗靜默，前台用商品 category 降級
  }

  function doLogout() {
    localStorage.removeItem(LS_CUSTOMER); localStorage.removeItem(LS_PRODUCTS);
    localStorage.removeItem(LS_CART);
    [idleTimer, logoutTimer].forEach(r => { if(r.current) clearTimeout(r.current); });
    setStage("login"); setCustomer(null); setCart({}); setTaxIdInput(""); setLoginError("");
    setLoginStep("input"); setPendingCompany(null); setSelectedBranchCode(""); setProducts([]); setIdleWarning(false);
  }
  function resetIdleTimer() {
    [idleTimer, logoutTimer].forEach(r => { if(r.current) clearTimeout(r.current); });
    setIdleWarning(false);
    idleTimer.current  = setTimeout(() => setIdleWarning(true), (IDLE_MINUTES-2)*60*1000);
    logoutTimer.current = setTimeout(() => doLogout(), IDLE_MINUTES*60*1000);
  }
  useEffect(() => {
    if (stage !== "shop") return;
    const events = ["mousedown","keydown","touchstart","scroll"];
    const h = () => resetIdleTimer();
    events.forEach(e => window.addEventListener(e, h, {passive:true}));
    resetIdleTimer();
    return () => { events.forEach(e => window.removeEventListener(e, h)); [idleTimer,logoutTimer].forEach(r=>{if(r.current)clearTimeout(r.current);}); };

  useEffect(() => {

      callGAS("getProducts", { branchCode: customer.code })
        .then(d => {
          setProducts(d.products); setPromos(d.promos||[]); localStorage.setItem("promos",JSON.stringify(d.promos||[]));
          localStorage.setItem(LS_PRODUCTS, JSON.stringify(d.products));
        })
        .catch(() => {}); // 靜默失敗，不打擾使用者
    }
  }, [stage, customer]);

  // 客戶顯示名稱（公司名稱，過濾掉統編格式）
  const customerDisplayName = useMemo(() => {
    if (!customer) return "";
    const name = customer.name || customer.companyName || "";
    if (/^\d+$/.test(name)) return customer.branchName || name;
    return name;
  }, [customer]);

  // 兩層分類：優先用 catTree，降級用商品的 category 欄位
  const treeParents = useMemo(() => Object.keys(catTree), [catTree]);
  const hasCatTree  = treeParents.length > 0;

  const filtered = useMemo(() => {
    let list = products.filter(p => {
      const matchSearch = !search || p.name.includes(search) || p.code.includes(search);
      if (!activeCat) return matchSearch;
      if (activeCat.child) return matchSearch && p.subCategory === activeCat.child && p.category === activeCat.parent;
      return matchSearch && p.category === activeCat.parent;
    });
    if (sortBy==="price_asc")  list = [...list].sort((a,b)=>Number(a.unitPrice)-Number(b.unitPrice));
    if (sortBy==="price_desc") list = [...list].sort((a,b)=>Number(b.unitPrice)-Number(a.unitPrice));
    if (sortBy==="code")       list = [...list].sort((a,b)=>a.code.localeCompare(b.code));
    return list;
  }, [products, activeCat, search, sortBy]);

  function countByParent(parent) { return products.filter(p=>p.category===parent).length; }
  function countByChild(parent,child) { return products.filter(p=>p.category===parent&&p.subCategory===child).length; }
  function toggleParent(p) { setOpenParents(prev=>({...prev,[p]:!prev[p]})); }

  // 進入 history stage 時自動載入
  useEffect(() => {
    if (stage === "history" && customer && hisOrders === null && !hisLoading) {
      queryHistory();
    }
  }, [stage]);

  // 歷史訂單查詢
  async function queryHistory() {
    if (!customer?.taxId) return;
    setHisLoading(true); setHisError(""); setHisOrders(null); setHisExpanded({}); setEditingOrderId(null);
    try { const d = await callGAS("getOrdersByTaxId",{taxId:customer.taxId}); setHisOrders(d.orders); }
    catch(e) { setHisError("查詢失敗："+e.message); }
    finally { setHisLoading(false); }
  }

  // 訂單狀態 badge 樣式
  function orderBadgeClass(s) {
    if (s==="未確認") return "order-badge unconfirmed";
    if (s==="準備中") return "order-badge preparing";
    if (s==="已出貨") return "order-badge shipped";
    return "order-badge unconfirmed";
  }

  // 開啟編輯（先彈確認視窗）
  function openModifyConfirm(orderId) { setConfirmModal({type:"modify", orderId}); }
  function openCancelConfirm(orderId) { setConfirmModal({type:"cancel", orderId}); }

  // 確認後進入編輯
  function startEditOrder(orderId) {
    const o = hisOrders.find(x=>x.orderId===orderId);
    if (!o) return;
    // 複製明細，加上 unitPrice 供重算用
    setEditLines(o.lines.map(l=>({
      code:l.code, name:l.name, qty:Number(l.qty),
      giftQty:Number(l.giftQty||0), unitPrice:Number(l.unitPrice),
      activity:l.activity||"", needsReview:l.lineStatus==="待複核",
      amount:Number(l.amount),
    })));
    setAddItemCode(""); setAddItemQty(1);
    setEditingOrderId(orderId);
    setHisExpanded(p=>({...p,[orderId]:true}));
    setConfirmModal(null);
  }

  // 編輯中更新數量（自動重算金額）
  function updateEditQty(code, qty) {
    setEditLines(prev=>prev.map(l=>{
      if (l.code!==code) return l;
      const rule = parseActivity(l.activity);
      let amount = qty * l.unitPrice;
      let giftQty = 0;
      if (rule && rule.type==="autoGift" && qty>0) giftQty = Math.floor(qty/rule.buy)*rule.free;
      if (rule && rule.type==="autoBox" && qty>0) { const boxes=Math.ceil(qty/(Number(products.find(p=>p.code===code)?.boxQty)||1)); amount=boxes*rule.boxPrice; }
      return {...l, qty, giftQty, amount};
    }));
  }

  // 刪除品項
  function removeEditLine(code) { setEditLines(prev=>prev.filter(l=>l.code!==code)); }

  // 新增品項
  function addEditItem() {
    if (!addItemCode) return;
    const p = products.find(x=>x.code===addItemCode);
    if (!p) { alert("找不到品號 "+addItemCode); return; }
    if (editLines.find(l=>l.code===addItemCode)) { updateEditQty(addItemCode, (editLines.find(l=>l.code===addItemCode).qty||0)+addItemQty); return; }
    const rule = parseActivity(p.activity);
    let amount = addItemQty * p.unitPrice;
    let giftQty = 0;
    if (rule && rule.type==="autoGift" && addItemQty>0) giftQty = Math.floor(addItemQty/rule.buy)*rule.free;
    if (rule && rule.type==="autoBox" && addItemQty>0) { const boxes=Math.ceil(addItemQty/(Number(p.boxQty)||1)); amount=boxes*rule.boxPrice; }
    setEditLines(prev=>[...prev,{code:p.code,name:p.name,qty:addItemQty,giftQty,unitPrice:p.unitPrice,activity:p.activity||"",needsReview:rule?.type==="needReview",amount}]);
    setAddItemCode(""); setAddItemQty(1);
  }

  // 儲存修改
  async function saveEditOrder() {
    if (editLines.length===0) { alert("訂單不能沒有品項，請至少保留一項"); return; }
    setEditSaving(true);
    try {
      await callGAS("updateOrderLines",{
        orderId: editingOrderId,
        taxId: customer.taxId,
        lines: editLines.map(l=>({...l, needsReview: l.needsReview||false})),
      });
      // 更新本地
      setHisOrders(prev=>prev.map(o=>{
        if (o.orderId!==editingOrderId) return o;
        const total = editLines.reduce((s,l)=>s+l.amount,0);
        return {...o, lines:editLines.map(l=>({...l,lineStatus:l.needsReview?"待複核":"正常"})), total, needsReview:editLines.some(l=>l.needsReview)};
      }));
      setEditingOrderId(null);
    } catch(e) { alert("儲存失敗："+e.message); }
    finally { setEditSaving(false); }
  }

  // 取消訂單
  async function doCancelOrder(orderId) {
    setConfirmModal(null);
    try {
      await callGAS("cancelOrder",{orderId, taxId:customer.taxId});
      setHisOrders(prev=>prev.filter(o=>o.orderId!==orderId));
    } catch(e) { alert("取消失敗："+e.message); }
  }
  const cartLines  = useMemo(() => Object.entries(cart).filter(([,q])=>q>0).map(([code,qty])=>{ const p=products.find(x=>x.code===code); return {product:p,qty,...computeLine(p,qty)}; }), [cart,products]);
  const promoGiftLines = useMemo(() => {
    if (!promos || promos.length === 0) return [];
    try { return calcPromoGifts(cartLines, promos, products); }
    catch(e) { console.error("促銷計算錯誤:", e); return []; }
  }, [cartLines, promos, products]);
  const cartCount  = cartLines.reduce((s,l)=>s+l.qty, 0);
  const cartTotal  = cartLines.reduce((s,l)=>s+l.amount, 0);
  const hasReview  = cartLines.some(l=>l.flag==="review");
  function setQty(code, qty) {
    setCart(p => {
      const next = {...p, [code]: Math.max(0, qty)};
      localStorage.setItem(LS_CART, JSON.stringify(next));
      return next;
    });
  }

  async function handleTaxIdSubmit() {
    const id = taxIdInput.trim(); if (!id) { setLoginError("請輸入統一編號"); return; }
    setLoginError(""); setLoading(true);
    try { const d = await callGAS("lookupTaxId",{taxId:id}); setPendingCompany(d); if(d.branches.length>1) setLoginStep("chooseBranch"); else { setSelectedBranchCode(d.branches[0].code); setLoginStep("confirm"); } }
    catch(e) { setLoginError(e.message||"查無此統一編號，請確認或聯繫業務人員"); }
    finally { setLoading(false); }
  }
  async function handleConfirmLogin() {
    const branch = pendingCompany.branches.find(b=>b.code===selectedBranchCode)||pendingCompany.branches[0];
    const nc = {name:pendingCompany.companyName, branchName:branch.name, code:branch.code, taxId:taxIdInput.trim()};
    setLoading(true); setPageError("");
    try { const d = await callGAS("getProducts",{branchCode:branch.code}); localStorage.setItem(LS_CUSTOMER,JSON.stringify(nc)); localStorage.setItem(LS_PRODUCTS,JSON.stringify(d.products)); localStorage.setItem("promos",JSON.stringify(d.promos||[])); setCustomer(nc); setProducts(d.products); setPromos(d.promos||[]); setStage("shop"); loadCatTree(); }
    catch(e) { setLoginError("商品資料載入失敗："+e.message); }
    finally { setLoading(false); }
  }
  function backToInput() { setLoginStep("input"); setPendingCompany(null); setSelectedBranchCode(""); setLoginError(""); }

  async function submitOrder() {
    setSubmitting(true); setPageError("");
    try {
      const d = await callGAS("submitOrder",{order:{taxId:customer.taxId,customerName:customer.name+"（"+customer.code+"）"+customer.branchName,branchCode:customer.code, note:orderNote,
        lines:[
          ...cartLines.map(l=>({code:l.product.code,name:l.product.name,qty:l.qty,giftQty:l.giftQty||0,unitPrice:l.product.unitPrice,amount:l.amount,activity:l.product.activity||"",needsReview:l.flag==="review"})),
          ...promoGiftLines.map(g=>({code:g.code,name:g.name,qty:g.qty,giftQty:0,unitPrice:0,amount:0,activity:g.activity,needsReview:false,isGift:true}))
        ]}});

    } catch(e) { setPageError("訂單送出失敗："+e.message+"，請稍後再試一次"); }

            {pendingCompany.branches.map(b=><button key={b.code} className={"branch-btn"+(selectedBranchCode===b.code?" active":"")} onClick={()=>setSelectedBranchCode(b.code)}><span style={{color:"#9aa6a4",fontSize:12}}>({b.code})</span> {b.name}</button>)}
          </div>
          {loginError && <div className="login-error">{loginError}</div>}
          <button className="submit-btn" disabled={!selectedBranchCode||loading} onClick={handleConfirmLogin}>{loading?"登入中…":"確認並登入"}</button>
          <button className="ghost-btn" style={{width:"100%",marginTop:8}} onClick={backToInput}>重新輸入統編</button>
        </React.Fragment>)}
      </div>
    </div>
  );

  if (stage==="confirmed" && lastOrder) return (

      <div className="order-id">訂單編號 {lastOrder.id}</div>

        <span style={{flex:1,fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0}}>{customerDisplayName}（{customer.code||customer.branchCode||""}）</span>
        <button style={{flexShrink:0,padding:"6px 13px",background:"var(--brand-tint)",border:"1px solid #c2dbd5",borderRadius:8,fontSize:13,cursor:"pointer",color:"var(--brand-dark)"}}
          onClick={()=>setStage("shop")}>← 返回選購</button>
        <button className="logout-link" style={{flexShrink:0}} onClick={doLogout}>登出</button>
      </div>
      <div style={{flex:1,overflowY:"auto",overflowX:"hidden"}}>
      <div className="history-wrap">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h2 style={{margin:0}}>我的訂單</h2>
          <button onClick={queryHistory} disabled={hisLoading}

            {hisLoading?"載入中…":"🔄 重新整理"}
          </button>
        </div>
        {/* 篩選列 */}
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center",background:"#fff",border:"1px solid var(--line)",borderRadius:10,padding:"12px 14px"}}>
          <input placeholder="🔍 搜尋品名、品號、訂單編號…" value={hisKeyword} onChange={e=>setHisKeyword(e.target.value)}
            style={{flex:1,minWidth:160,padding:"8px 12px",border:"1px solid var(--line)",borderRadius:8,fontSize:13}}/>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"var(--ink-soft)",whiteSpace:"nowrap"}}>日期</span>
            <input type="date" value={hisDateFrom} onChange={e=>setHisDateFrom(e.target.value)}
              style={{padding:"7px 9px",border:"1px solid var(--line)",borderRadius:7,fontSize:13}}/>
            <span style={{fontSize:12,color:"var(--ink-soft)"}}>—</span>
            <input type="date" value={hisDateTo} onChange={e=>setHisDateTo(e.target.value)}
              style={{padding:"7px 9px",border:"1px solid var(--line)",borderRadius:7,fontSize:13}}/>
          </div>
          {(hisKeyword||hisDateFrom||hisDateTo)&&(

        {hisOrders!==null&&filteredHisOrders.length===0&&!hisLoading&&(

              <React.Fragment>
                <h4>修改訂單</h4>
                <p>進入修改模式後，可調整數量、刪除或新增品項。確認修改訂單 <b>{confirmModal.orderId}</b>？</p>
                <div className="confirm-modal-btns">
                  <button className="ghost-btn" style={{padding:"8px 14px",fontSize:13,marginTop:0}} onClick={()=>setConfirmModal(null)}>取消</button>
                  <button className="submit-btn" style={{width:"auto",padding:"8px 20px",fontSize:13,marginTop:0}} onClick={()=>startEditOrder(confirmModal.orderId)}>進入編輯</button>
                </div>
              </React.Fragment>
            ):(
              <React.Fragment>
                <h4>取消訂單</h4>
                <p>確定要取消訂單 <b>{confirmModal.orderId}</b>？此動作無法復原。</p>
                <div className="confirm-modal-btns">
                  <button className="ghost-btn" style={{padding:"8px 14px",fontSize:13,marginTop:0}} onClick={()=>setConfirmModal(null)}>返回</button>
                  <button style={{padding:"8px 20px",fontSize:13,background:"var(--danger)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer"}} onClick={()=>doCancelOrder(confirmModal.orderId)}>確認取消</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}
      </div>
    </div>
  );

  return (
    <div>
      <div className="app-header">
        <div className="header-who">
          <span className="company">{/^\d+$/.test(customer.name||"")?customer.branchName:(customer.name||"")}（{customer.code||customer.branchCode||""}）{customer.branchName||""}</span>
        </div>
        <div className="header-actions">
          <button className="btn-orders" onClick={()=>setStage("history")}>
            📋 <span className="label">我的訂單</span>
          </button>
          <button className="cart-pill" onClick={()=>setDrawerOpen(true)}>
            🛒 <span className="cart-label">購物車</span>{cartCount>0&&<span className="cart-badge">{cartCount}</span>}
          </button>
          <button className="logout-link" onClick={doLogout}><span className="label">登出</span></button>
        </div>
        <div className="header-searchbar">
          <select className="header-sort" value={sortBy} onChange={e=>setSortBy(e.target.value)}>
            <option value="default">預設排序</option>
            <option value="code">品號</option>
            <option value="price_asc">價格↑</option>
            <option value="price_desc">價格↓</option>
          </select>
          <div className="header-search">
            <span className="search-icon">🔍</span>
            <input placeholder="搜尋品名或品號…" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
        {/* ── 手機專用：分類 pill 列（header 第三行）── */}
        <div className="header-cats">
          <div className="header-cats-row1">
            <button className={"cat-pill-all"+(activeCat===null?" active":"")} onClick={()=>setActiveCat(null)}>全部</button>
            {hasCatTree ? treeParents.map(parent=>(
              <button key={parent}
                className={"cat-pill-parent"+(activeCat&&activeCat.parent===parent?" active":"")}
                onClick={()=>setActiveCat({parent,child:null})}>
                {parent}
              </button>
            )) : [...new Set(products.map(p=>p.category))].map(cat=>(
              <button key={cat}
                className={"cat-pill-parent"+(activeCat&&activeCat.parent===cat?" active":"")}
                onClick={()=>setActiveCat({parent:cat,child:null})}>
                {cat}
              </button>
            ))}
          </div>
          {hasCatTree && activeCat && (catTree[activeCat.parent]||[]).length>0 && (
            <div className="header-cats-row2">
              {(catTree[activeCat.parent]||[]).map(child=>(
                <button key={child}
                  className={"cat-pill-child"+(activeCat.child===child?" active":"")}
                  onClick={()=>setActiveCat({parent:activeCat.parent,child})}>
                  {child}
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
      <div className="layout">
        <div className="sidebar">
          {/* ── 第一行：全部 + 大類 ── */}
          <div className="sidebar-row1">
            <button className={"sidebar-all"+(activeCat===null?" active":"")} onClick={()=>setActiveCat(null)}>
              全部
            </button>
            {hasCatTree ? treeParents.map(parent=>{
              const isParentActive = activeCat&&activeCat.parent===parent;
              return (
                <button key={parent}
                  className={"sidebar-parent-btn"+(isParentActive?" active":"")}
                  onClick={()=>{ toggleParent(parent); setActiveCat({parent,child:null}); }}>
                  {parent}
                  <span className="arrow">{openParents[parent]?"▼":"▶"}</span>
                </button>
              );
            }) : [...new Set(products.map(p=>p.category))].map(cat=>(
              <button key={cat} className={"sidebar-parent-btn"+(activeCat&&activeCat.parent===cat?" active":"")}
                onClick={()=>setActiveCat({parent:cat,child:null})}>
                {cat}
              </button>
            ))}
          </div>
          {/* ── 第二行：選中大類的子類 ── */}
          {hasCatTree && activeCat && (catTree[activeCat.parent]||[]).length > 0 && (
            <div className="sidebar-row2">
              {(catTree[activeCat.parent]||[]).map(child=>(
                <button key={child}
                  className={"sidebar-child"+(activeCat.child===child?" active":"")}
                  onClick={()=>setActiveCat({parent:activeCat.parent,child})}>
                  {child}
                </button>
              ))}
            </div>
          )}
          {/* ── 桌機：垂直展開子類（sidebar-children 區塊，手機隱藏） ── */}
          <div className="sidebar-desktop-tree">
            {hasCatTree ? treeParents.map(parent=>(
              <div key={parent}>
                <button className={"sidebar-parent-btn"+(activeCat&&activeCat.parent===parent&&!activeCat.child?" active":"")}
                  onClick={()=>{ toggleParent(parent); setActiveCat({parent,child:null}); }}>
                  {parent}
                  <span className="arrow">{openParents[parent]?"▼":"▶"}</span>
                </button>
                {openParents[parent]&&(
                  <div className="sidebar-children">
                    <button className={"sidebar-child"+(activeCat&&activeCat.parent===parent&&!activeCat.child?" active":"")}
                      onClick={()=>setActiveCat({parent,child:null})}>全部（{countByParent(parent)}）</button>
                    {(catTree[parent]||[]).map(child=>(
                      <button key={child} className={"sidebar-child"+(activeCat&&activeCat.parent===parent&&activeCat.child===child?" active":"")}
                        onClick={()=>setActiveCat({parent,child})}>
                        {child}<span className="count">{countByChild(parent,child)}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            )) : [...new Set(products.map(p=>p.category))].map(cat=>(
              <button key={cat} className={"sidebar-child"+(activeCat&&activeCat.parent===cat&&!activeCat.child?" active":"")}
                onClick={()=>setActiveCat({parent:cat,child:null})}>
                {cat}<span className="count">{products.filter(p=>p.category===cat).length}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="main">
          <div className="main-title-row">
            <h2 className="main-title">{activeCat ? (activeCat.child||activeCat.parent) : "全部商品"}</h2>
            <span className="main-count">{filtered.length} 項商品</span>
          </div>
          <div className="grid">
            {filtered.map(p=>{const rule=parseActivity(p.activity);const qty=cart[p.code]||0;const calc=computeLine(p,qty);const imgs=(p.images||[]).map(fixImgUrl);const matchedPromo=(promos||[]).find(pr=>{if(pr.triggerCodes==="全部")return true;return pr.triggerCodes.split(",").map(c=>c.trim()).includes(p.code);});return(
              <div key={p.code} className={"card"+(p.inactive?" disabled":"")}>
                <ImageSlider images={imgs}/>
                <div className="card-body">
                  <div className="code">{p.code}</div>
                  <div className="name">{p.name}</div>
                  <div className="price-row">
                    <span className="unit-price">${p.unitPrice}</span>
                    {p.listPrice&&<span className="list-price">${p.listPrice}</span>}
                  </div>
                  <div className="box-qty">每箱 {p.boxQty} 入</div>
                  {rule&&rule.type==="autoGift"&&<span className="tag gift">{rule.label}</span>}
                  {rule&&rule.type==="autoBox"&&<span className="tag box">{rule.label}</span>}
                  {rule&&rule.type==="needReview"&&<span className="tag review">⚠ 待複核</span>}
                  {!rule&&matchedPromo&&<span className="tag gift">{matchedPromo.name}</span>}
                  {p.inactive&&<span className="tag stop">已失效</span>}
                </div>
                <div className="qty-row">
                  <button className="qty-btn" onClick={()=>setQty(p.code,qty-1)}>－</button>
                  <input className="qty-input" type="number" min="0" value={qty} onChange={e=>setQty(p.code,Number(e.target.value)||0)}/>
                  <button className="qty-btn" onClick={()=>setQty(p.code,qty+1)}>＋</button>
                  {qty>0&&calc.giftQty>0&&<span className="added">+贈{calc.giftQty}</span>}
                </div>
              </div>
            );})}
          </div>
        </div>
      </div>
      {drawerOpen&&(<React.Fragment>
        <div className="drawer-mask" onClick={()=>setDrawerOpen(false)}/>
        <div className="drawer">
          <div className="drawer-head"><h3>購物車</h3><button onClick={()=>setDrawerOpen(false)}>✕</button></div>
          <div className="drawer-body">
            {cartLines.length===0?<div className="empty-cart">購物車是空的，請先選購商品</div>:cartLines.map(l=>(
              <div className="cart-line" key={l.product.code}>
                <div className="info">
                  <div className="name">{l.product.name}</div>
                  <div className="meta">{l.qty} 件 × ${l.product.unitPrice}{l.giftQty>0&&`　送 ${l.giftQty} 件`}{l.flag&&l.flag!=="review"&&`　${l.flag}`}{l.flag==="review"&&<span style={{color:"var(--warn)"}}>　⚠待業務複核</span>}</div>
                  <button className="remove" onClick={()=>setQty(l.product.code,0)}>移除</button>
                </div>
                <div className="lineprice">${l.amount.toLocaleString()}</div>
              </div>
            ))}
          </div>
          <div className="drawer-foot">
            <div className="total-row grand"><span>合計</span><span>${cartTotal.toLocaleString()}</span></div>
            {hasReview&&<div className="review-note">此訂單含特殊促銷品項，系統試算金額僅供參考，正式金額將由業務人員複核後確認。</div>}
            <textarea value={orderNote} onChange={e=>setOrderNote(e.target.value)}
              placeholder="備註（選填）：送貨時間、特殊需求…"
              style={{width:"100%",padding:"9px 11px",border:"1px solid var(--line)",borderRadius:8,fontSize:13,resize:"vertical",minHeight:52,fontFamily:"inherit",marginBottom:8,marginTop:8}}/>
            {pageError&&<div className="login-error">{pageError}</div>}
            {/* 促銷贈品行 */}
            {promoGiftLines.length>0&&(
              <div style={{margin:"8px 0",padding:"8px 12px",background:"#f0f7f3",borderRadius:8,border:"1px solid var(--brand-tint)"}}>
                <div style={{fontSize:12,fontWeight:700,color:"var(--brand-dark)",marginBottom:6}}>🎁 促銷贈品</div>
                {promoGiftLines.map((g,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"3px 0",borderBottom:"1px solid var(--line)"}}>
                    <span>{g.name} × {g.qty}</span>
                    <span style={{color:"var(--brand-dark)",fontWeight:600}}>$0　<span style={{fontSize:11,color:"var(--ink-soft)"}}>{g.activity}</span></span>
                  </div>
                ))}
              </div>
            )}
            <button className="submit-btn" disabled={cartLines.length===0||submitting} onClick={submitOrder}>{submitting?"送出中…":"送出訂單"}</button>
          </div>
        </div>
      </React.Fragment>)}
      {idleWarning&&(
        <div className="idle-banner">⚠ 即將自動登出，點此繼續使用
          <button style={{marginLeft:12,background:"var(--brand)",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",cursor:"pointer"}} onClick={resetIdleTimer}>繼續使用</button>
        </div>
      )}
      {lightbox&&(
        <div className="lightbox-mask" onClick={closeLightbox}>
          <div className="lightbox-inner" onClick={e=>e.stopPropagation()}>
            <button className="lightbox-close" onClick={closeLightbox}>✕</button>
            {lightbox.images.length>1&&<button className="lightbox-btn" onClick={lbPrev}>‹</button>}
            <img src={lightbox.images[lightbox.index]} alt={lightbox.productName}/>
            {lightbox.images.length>1&&<button className="lightbox-btn" onClick={lbNext}>›</button>}
            {lightbox.images.length>1&&<div className="lightbox-dots">{lightbox.images.map((_,i)=><span key={i} className={i===lightbox.index?"active":""} onClick={()=>setLightbox(lb=>({...lb,index:i}))}/>)}</div>}
          </div>
        </div>
      )}
      {/* ── 手機底部 Footer ── */}
      <div className="bottom-nav">
        <button className={"bottom-nav-btn"+(stage==="history"?" active":"")} onClick={()=>setStage(stage==="history"?"shop":"history")}>
          <span className="bnav-icon">📋</span>
          <span>我的訂單</span>
        </button>
        <button className="bottom-nav-cart" onClick={()=>setDrawerOpen(true)}>
          <span className="bnav-icon">🛒</span>
          {cartCount>0 && <span className="bnav-badge">{cartCount}</span>}
          <span>購物車</span>
        </button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
