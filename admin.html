<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理後台 – 業務訂購系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{--ink:#1c2b2d;--ink-soft:#4a5a5c;--line:#dde3e1;--paper:#fafaf8;--panel:#ffffff;--brand:#2f6f5e;--brand-dark:#1f4d40;--brand-tint:#eaf3f0;--warn:#b5762b;--warn-tint:#fbf0e2;--danger:#a3402f;--danger-tint:#fbeae6;--radius:10px;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--paper);color:var(--ink);}
  #root{min-height:100vh;}

  /* Modal */
  .modal-mask{position:fixed;inset:0;background:rgba(20,30,28,.45);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-card{background:#fff;border-radius:var(--radius);padding:24px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.12);}
  .login-error{font-size:13px;color:var(--danger);background:var(--danger-tint);padding:9px 12px;border-radius:6px;margin-bottom:12px;line-height:1.5;}
  /* 密碼頁 */
  .pw-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .pw-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:36px 28px;}
  .pw-card h1{font-size:20px;margin:0 0 4px;}
  .pw-card p{font-size:13px;color:var(--ink-soft);margin:0 0 20px;}
  .pw-input{width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:8px;font-size:16px;letter-spacing:.12em;margin-bottom:10px;}
  .pw-input:focus{outline:none;border-color:var(--brand);}
  .login-error{font-size:13px;color:var(--danger);background:var(--danger-tint);padding:9px 12px;border-radius:6px;margin-bottom:12px;line-height:1.5;}
  .submit-btn{width:100%;padding:13px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
  .submit-btn:disabled{background:#c7cdcb;cursor:not-allowed;}

  /* Header */
  .app-header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);padding:0 20px;display:grid;grid-template-columns:1fr auto;grid-template-rows:48px auto;grid-template-areas:"title actions" "tabs tabs";align-items:center;}
  .app-header-title{grid-area:title;display:flex;align-items:center;justify-content:flex-start;font-weight:700;font-size:15px;height:48px;}
  .app-header-actions{grid-area:actions;display:flex;align-items:center;justify-content:flex-end;gap:8px;height:48px;}
  .app-header-tabs{grid-area:tabs;display:flex;align-items:center;gap:4px;border-top:1px solid var(--line);border-bottom:2px solid var(--line);padding:0;}
  .logout-link{font-size:12px;color:var(--ink-soft);background:none;border:none;text-decoration:underline;cursor:pointer;padding:0;}

  /* Tabs */
  .admin-tabs{display:flex;gap:4px;border-bottom:2px solid var(--line);padding-bottom:0;margin-bottom:20px;}
  .app-header-tabs .tab-btn{padding:10px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-1px;}
  .app-header-tabs .tab-btn.active{color:var(--brand-dark);font-weight:700;border-bottom-color:var(--brand);}
  .tab-btn{padding:9px 18px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--ink-soft);border-bottom:2px solid transparent;margin-bottom:-2px;}
  .tab-btn.active{color:var(--brand-dark);font-weight:700;border-bottom-color:var(--brand);}

  /* 後台主區 */
  .admin-wrap{max-width:1100px;margin:0 auto;padding:20px;}

  /* 篩選列 */
  .filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center;}
  .filters input,.filters select{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .filters input{flex:1;min-width:140px;}
  .date-wrap{display:flex;align-items:center;gap:6px;}
  .date-wrap span{font-size:12px;color:var(--ink-soft);}
  .ghost-btn{padding:6px 12px;background:#fff;border:1px solid var(--line);border-radius:7px;font-size:13px;cursor:pointer;}

  /* 統計卡片 */
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .stat-card{flex:1;min-width:110px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px;}
  .stat-card .label{font-size:11px;color:var(--ink-soft);margin-bottom:4px;}
  .stat-card .value{font-size:22px;font-weight:700;color:var(--ink);}
  .stat-card .value.warn{color:var(--warn);}

  /* 批次列 */
  .batch-bar{display:flex;align-items:center;gap:12px;background:var(--brand-tint);border:1px solid #c2dbd5;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--brand-dark);}
  .batch-bar button{background:var(--brand);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer;margin-left:auto;}

  /* 訂單表格 */
  .admin-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .admin-table th{text-align:left;background:#f4f6f5;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:600;}
  .admin-table td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .admin-table input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:var(--brand);}
  .download-btn{background:var(--brand);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;}
  .pill-status{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;}
  .pill-status.ok{background:var(--brand-tint);color:var(--brand-dark);}
  .pill-status.review{background:var(--warn-tint);color:var(--warn);}

  /* 商品/價格管理表格 */
  .mgmt-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .mgmt-table th{text-align:left;background:#f4f6f5;padding:9px 10px;border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap;}
  .mgmt-table td{padding:6px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .mgmt-table tr.editing td{background:#f7fbfa;}
  .cell-input{width:100%;padding:5px 7px;border:1px solid var(--brand);border-radius:5px;font-size:13px;background:#fff;box-shadow:0 0 0 2px rgba(47,111,94,.12);}
  .cell-text{display:block;padding:4px 2px;min-height:22px;}
  .cell-text.empty{color:#bbb;font-style:italic;}
  .row-actions{display:flex;gap:6px;white-space:nowrap;}
  .btn-save{background:var(--brand);color:#fff;border:none;padding:5px 12px;border-radius:5px;font-size:12px;cursor:pointer;}
  .btn-cancel{background:#fff;color:var(--ink-soft);border:1px solid var(--line);padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;}
  .btn-edit{background:#f4f6f5;border:1px solid var(--line);color:var(--ink-soft);padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;}
  .btn-del{background:var(--danger-tint);color:var(--danger);border:1px solid #eacfca;padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;}

  /* 新增表單 */
  .add-form{background:var(--brand-tint);border:1px dashed #b0d0c8;border-radius:8px;padding:14px 16px;margin-top:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
  .add-form label{font-size:12px;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;}
  .add-form input,.add-form select{padding:7px 9px;border:1px solid var(--line);border-radius:6px;font-size:13px;background:#fff;}
  .add-form .wide{flex:2;min-width:160px;}
  .add-form .narrow{flex:1;min-width:80px;}

  /* 圖片縮圖 */
  .img-thumb-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .img-thumb-sm{position:relative;width:72px;height:72px;border-radius:5px;overflow:hidden;border:1px solid var(--line);flex-shrink:0;}
  .img-thumb-sm img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block;}
  .img-thumb-sm .del-img{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(163,64,47,.88);color:#fff;border:none;border-radius:50%;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;opacity:0;transition:opacity .15s;}
  .img-thumb-sm:hover .del-img{opacity:1;}
  .img-thumb-add{width:72px;height:72px;border:2px dashed var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:20px;cursor:pointer;flex-shrink:0;}
  .img-thumb-add{width:48px;height:48px;border:2px dashed var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:20px;cursor:pointer;flex-shrink:0;}
  .img-thumb-add:hover{border-color:var(--brand);color:var(--brand);}

  /* 燈箱 */
  .lightbox-mask{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;padding:20px;}
  .lightbox-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;gap:12px;}
  .lightbox-inner img{max-width:80vw;max-height:82vh;object-fit:contain;border-radius:6px;}
  .lightbox-btn{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;width:44px;height:44px;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .lightbox-close{position:absolute;top:-44px;right:0;background:none;border:none;color:#fff;font-size:26px;cursor:pointer;}
  .lightbox-dots{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
  .lightbox-dots span{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);cursor:pointer;}
  .lightbox-dots span.active{background:#fff;}

  /* 上傳遮罩 */
  .uploading-mask{position:fixed;inset:0;z-index:70;background:rgba(20,30,28,.5);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-direction:column;gap:10px;}

  /* 數據儀表板 */
  .dash-kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
  .kpi-card{flex:1;min-width:130px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px 18px;}
  .kpi-card .k-label{font-size:11px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.04em;}
  .kpi-card .k-value{font-size:26px;font-weight:800;color:var(--ink);}
  .kpi-card .k-value.green{color:var(--brand-dark);}
  .kpi-card .k-value.warn{color:var(--warn);}
  .kpi-card .k-value.blue{color:#3d4f9e;}
  .kpi-card .k-sub{font-size:11px;color:var(--ink-soft);margin-top:4px;}
  .dash-section{background:#fff;border:1px solid var(--line);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
  .dash-section h3{font-size:14px;margin:0 0 14px;color:var(--ink);}
  /* 長條圖 */
  .bar-chart{display:flex;flex-direction:column;gap:8px;}
  .bar-row{display:flex;align-items:center;gap:10px;font-size:12px;}
  .bar-label{width:120px;flex-shrink:0;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;background:#f0f4f3;border-radius:4px;height:18px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;background:var(--brand);transition:width .4s ease;}
  .bar-val{width:70px;text-align:right;font-weight:600;flex-shrink:0;}
  /* 折線圖（純 CSS SVG） */
  .line-chart-wrap{width:100%;overflow-x:auto;}
  .trend-table{width:100%;border-collapse:collapse;font-size:12px;}
  .trend-table th{background:#f4f6f5;padding:5px 8px;text-align:right;font-weight:600;}
  .trend-table th:first-child{text-align:left;}
  .trend-table td{padding:5px 8px;border-bottom:1px solid var(--line);text-align:right;}
  .trend-table td:first-child{text-align:left;color:var(--ink-soft);}
  /* 圓餅狀態圖 */
  .status-chips{display:flex;gap:10px;flex-wrap:wrap;}
  .status-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;}
  .status-chip.unc{background:var(--warn-tint);color:var(--warn);}
  .status-chip.prep{background:#eef1fb;color:#3d4f9e;}
  .status-chip.ship{background:var(--brand-tint);color:var(--brand-dark);}
  /* 日期篩選列 */
  .dash-filter{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .dash-filter input[type="date"]{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
  .dash-filter select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .dash-quick-btn{padding:7px 14px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:12px;cursor:pointer;}
  .dash-quick-btn.active{background:var(--brand);color:#fff;border-color:var(--brand);}

  /* 客戶管理 */
  .cust-mgmt-table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .cust-mgmt-table th{text-align:left;background:#f4f6f5;padding:9px 12px;border-bottom:1px solid var(--line);font-weight:600;}
  .cust-mgmt-table td{padding:8px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}

  /* 新訂單通知 */
  .notif-badge{position:absolute;top:-4px;right:-4px;background:var(--danger);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;}
  .tab-wrap{position:relative;display:inline-block;}
  .new-order-banner{position:fixed;top:56px;right:16px;z-index:40;background:var(--brand-dark);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.2);}
  .new-order-banner button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 10px;border-radius:5px;font-size:12px;cursor:pointer;}

  /* 訂單備註 */
  .order-note-box{margin-top:8px;padding:8px 12px;background:#fffbf3;border:1px solid #e8d9b5;border-radius:6px;font-size:12px;color:#7a6030;}
  .note-edit-area{width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px;resize:vertical;min-height:56px;font-family:inherit;}

  /* Excel 匯入 */
  .import-zone{border:2px dashed var(--line);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:border-color .2s;}
  .import-zone:hover,.import-zone.drag{border-color:var(--brand);background:var(--brand-tint);}
  .import-zone p{margin:8px 0 0;font-size:13px;color:var(--ink-soft);}
  .import-preview{margin-top:14px;overflow-x:auto;}
  .import-preview table{width:100%;border-collapse:collapse;font-size:12px;}
  .import-preview th{background:#f4f6f5;padding:5px 8px;text-align:left;font-weight:600;}
  .import-preview td{padding:5px 8px;border-bottom:1px solid var(--line);}

  /* 商品批次操作 */
  .batch-action-bar{display:flex;gap:8px;align-items:center;padding:8px 12px;background:var(--warn-tint);border:1px solid #e8d9b5;border-radius:8px;margin-bottom:12px;font-size:13px;}
  .sort-bar{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--ink-soft);}
  .sort-btn{padding:4px 10px;border:1px solid var(--line);border-radius:5px;background:#fff;font-size:12px;cursor:pointer;}
  .sort-btn.active{background:var(--brand);color:#fff;border-color:var(--brand);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect, useRef } = React;
const GAS_URL = "https://script.google.com/macros/s/AKfycby48Nyzb4q5265opAIWwRGTdBFlnYnsa-0lS9w0EIGAaRVCNBYqvd9Wc5Hip2DySgEiwQ/exec";
const ADMIN_PASSWORD = "0000"; // ← 修改此處變更後台密碼
const LS_MASTER = "admin_master"; // 後台快取商品主檔，供圖片管理用

// Google Drive 圖片網址正規化
function fixImgUrl(url) {
  if (!url) return url;
  if (url.includes('thumbnail')) return url;
  var m = url.match(/[?&]id=([^&]+)/);
  if (m) return 'https://drive.google.com/thumbnail?id=' + m[1] + '&sz=w400';
  return url;
}

// 訂單客戶名稱顯示：公司名稱（分店代號）分店名稱
function formatOrderName(customerName, branchCode, branchName) {
  var name = customerName || "";
  // 如果已是完整格式（含括號）直接用
  if (name.includes("（") || name.includes("(")) return name;
  // 組合：公司名（分店代號）分店名稱
  var result = name;
  if (branchCode) result += "（" + branchCode + "）";
  if (branchName) result += branchName;
  return result || branchCode || "";
}

// UTC 時間字串轉台灣時間顯示格式
function formatTime(t) {
  if (!t) return "";
  try {
    // GAS 寫入的格式 "2026-06-23 09:29:39" 不需轉換
    if (!String(t).includes("T")) return String(t).replace(".000Z","");
    // ISO 格式轉台灣時間
    const d = new Date(t);
    return d.toLocaleString("zh-TW", {timeZone:"Asia/Taipei", year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false});
  } catch(e) { return String(t); }
}

async function callGAS(action, payload) {
  const res = await fetch(GAS_URL, {
    method: "POST",
    redirect: "follow",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify(Object.assign({action}, payload||{}))
  });
  const text = await res.text();
  if (text.trim().startsWith("<")) {
    throw new Error("GAS 回傳非 JSON（可能需要重新部署）：" + text.substring(0,80));
  }
  const data = JSON.parse(text);
  if (!data.ok) throw new Error(data.error || "後端回應失敗");
  return data;
}

function Admin() {
  // ── 密碼 ──
  const [authed, setAuthed] = useState(() => sessionStorage.getItem("adminAuthed")==="1");
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState("");

  function handleLogin() {
    if (pwInput === ADMIN_PASSWORD) { sessionStorage.setItem("adminAuthed","1"); setAuthed(true); loadOrders(); }
    else { setPwError("密碼錯誤，請重新輸入"); setPwInput(""); }
  }
  function handleLogout() { sessionStorage.removeItem("adminAuthed"); setAuthed(false); setPwInput(""); setOrders([]); setMasterRows([]); setPriceRows([]); setCheckedOrders({}); }

  // ── Tab ──
  const [tab, setTab] = useState("orders");

  // ── 新訂單通知 ──
  const [newOrderCount, setNewOrderCount] = useState(0);
  const lastOrderCount = useRef(0);
  const pollTimer = useRef(null);

  // 後台輪詢：每60秒檢查新訂單
  useEffect(() => {
    if (!authed) return;
    function poll() {
      callGAS("listOrders").then(d => {
        const unconfirmed = d.orders.filter(o=>o.orderStatus==="未確認").length;
        if (lastOrderCount.current > 0 && unconfirmed > lastOrderCount.current) {
          setNewOrderCount(unconfirmed - lastOrderCount.current);
        }
        lastOrderCount.current = unconfirmed;
        if (tab === "orders") setOrders(d.orders);
      }).catch(()=>{});
    }
    pollTimer.current = setInterval(poll, 60000);
    return () => clearInterval(pollTimer.current);
  }, [authed, tab]);

  // ── 訂單 ──
  const [orders,      setOrders]      = useState([]);
  const [ordLoading,  setOrdLoading]  = useState(false);
  const [ordError,    setOrdError]    = useState("");
  const [fCust,       setFCust]       = useState("");
  const [fStatus,     setFStatus]     = useState("all");
  const [fFrom,       setFFrom]       = useState("");
  const [fTo,         setFTo]         = useState("");
  const [checkedOrders, setCheckedOrders] = useState({});

  async function loadOrders() {
    setOrdLoading(true); setOrdError("");
    try { const d = await callGAS("listOrders"); setOrders(d.orders); }
    catch(e) { setOrdError("載入失敗："+e.message); }
    finally { setOrdLoading(false); }
  }
  useEffect(() => { if (tab==="orders" && authed && orders.length===0) loadOrders(); }, [tab, authed]);

  const filteredOrders = useMemo(() => orders.filter(o => {
    if (fCust && !o.customerName.includes(fCust) && !o.branchCode.includes(fCust)) return false;
    if (fStatus==="ok" && o.needsReview) return false;

  function onDragStart(e, info) {

  function onDrop(e, info) {
    e.preventDefault();
    const src = dragItem.current;
    const tgt = info;
    if (!src || !tgt) return;
    setDragTree(prev => {
      const tree = prev.map(g => ({ parent: g.parent, children: [...g.children] }));
      if (src.type === 'parent' && tgt.type === 'parent' && src.parentIdx !== tgt.parentIdx) {
        // 大類換位置
        const [moved] = tree.splice(src.parentIdx, 1);
        tree.splice(tgt.parentIdx, 0, moved);
      } else if (src.type === 'child' && tgt.type === 'child') {
        if (src.parentIdx === tgt.parentIdx) {
          // 同大類子類換順序
          const children = tree[src.parentIdx].children;
          const [moved] = children.splice(src.childIdx, 1);
          children.splice(tgt.childIdx, 0, moved);
        } else {
          // 跨大類：子類移到另一個大類
          const [moved] = tree[src.parentIdx].children.splice(src.childIdx, 1);
          tree[tgt.parentIdx].children.splice(tgt.childIdx, 0, moved);
        }
      } else if (src.type === 'child' && tgt.type === 'parent') {
        // 子類拖到大類標題 → 移到該大類最前面
        const [moved] = tree[src.parentIdx].children.splice(src.childIdx, 1);
        tree[tgt.parentIdx].children.unshift(moved);
      }
      return tree;
    });
    dragItem.current = null;
    dragOver.current = null;
  }

    if (!confirm(`確定刪除「${row.companyName} ${row.branchName}」？`)) return;
    try {
      await callGAS("deleteCustomer",{taxId:row.taxId, branchCode:row.branchCode});
      setCustRows(prev=>prev.filter(r=>r.branchCode!==row.branchCode));
    } catch(e) { alert("刪除失敗："+e.message); }
  }
  async function addCust() {
    if (!newCust.branchCode || !newCust.companyName) { alert("公司名稱和分店代號為必填"); return; }
    try {
      await callGAS("saveCustomer",{row:newCust});
      setCustRows(prev=>[...prev,{...newCust}]);
      setNewCust({taxId:"",companyName:"",branchCode:"",branchName:"",region:""});
      setShowAddCust(false);
    } catch(e) { alert("新增失敗："+e.message); }
  }

  // ── 商品排序 ──
  const [mSort, setMSort] = useState("code");
  const [mSortDir, setMSortDir] = useState("asc");
  function toggleSort(col) {
    if (mSort===col) setMSortDir(d=>d==="asc"?"desc":"asc");
    else { setMSort(col); setMSortDir("asc"); }
  }
  const filteredMaster = useMemo(() => masterRows.filter(r => {
    if (mCatFilter && r.category !== mCatFilter) return false;
    return !mSearch || r.name.includes(mSearch) || r.code.includes(mSearch) || (r.category||"").includes(mSearch);
  }), [masterRows, mSearch, mCatFilter]);
  const sortedMaster = useMemo(() => [...filteredMaster].sort((a,b)=>{
    let va=a[mSort]||"", vb=b[mSort]||"";
    if (!isNaN(va) && !isNaN(vb)) { va=Number(va); vb=Number(vb); }
    if (va<vb) return mSortDir==="asc"?-1:1;
    if (va>vb) return mSortDir==="asc"?1:-1;
    return 0;
  }), [filteredMaster, mSort, mSortDir]);

  // ── 商品批次操作 ──
  const [checkedMaster, setCheckedMaster] = useState({});
  const checkedMasterList = sortedMaster.filter(r=>checkedMaster[r.code]);
  const allMasterChecked = sortedMaster.length>0 && checkedMasterList.length===sortedMaster.length;
  function toggleMasterCheck(code) { setCheckedMaster(p=>({...p,[code]:!p[code]})); }
  function toggleAllMaster() {
    if (allMasterChecked) setCheckedMaster({});
    else { const n={}; sortedMaster.forEach(r=>{n[r.code]=true;}); setCheckedMaster(n); }
  }
  async function batchSetInactive(val) {
    if (!confirm(`確定將 ${checkedMasterList.length} 筆商品設為「${val?"失效":"有效"}」？`)) return;
    try {
      for (const row of checkedMasterList) {
        await callGAS("saveMasterRow",{row:{...row,inactive:val}});
      }
      setMasterRows(prev=>prev.map(r=>checkedMaster[r.code]?{...r,inactive:val}:r));
      setCheckedMaster({});
    } catch(e) { alert("批次操作失敗："+e.message); }
  }

  // ── Excel 匯入商品 ──
  const [importPreview, setImportPreview] = useState(null); // [{code,name,category,...}]
  const [importDrag, setImportDrag]       = useState(false);
  const importFileRef = useRef(null);

  function handleImportFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:"array"});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
        // 欄位對照（支援中英文）
        const mapped = rows.map(r => ({
          code:      String(r["品號"]||r["code"]||r["產品編號"]||"").trim().padStart(6,"0"),
          name:      String(r["品名"]||r["name"]||"").trim(),
          category:  String(r["分類"]||r["category"]||"").trim(),
          listPrice: String(r["定價"]||r["listPrice"]||"").trim(),
          boxQty:    String(r["箱入"]||r["箱入數"]||r["boxQty"]||"").trim(),
          cost:      String(r["成本"]||r["cost"]||"").trim(),
          inactive:  String(r["失效"]||r["inactive"]||"").trim()==="是",
        })).filter(r=>r.code && r.name);
        setImportPreview(mapped);
      } catch(err) { alert("檔案解析失敗："+err.message); }
    };
    reader.readAsArrayBuffer(file);
  }
  async function doImport() {
    if (!importPreview || importPreview.length===0) return;
    if (!confirm(`確定匯入 ${importPreview.length} 筆商品？現有相同品號的資料會被覆蓋。`)) return;
    try {
      for (const row of importPreview) {
        await callGAS("saveMasterRow",{row});
      }
      await loadMaster();
      setImportPreview(null);
      alert(`成功匯入 ${importPreview.length} 筆商品`);
    } catch(e) { alert("匯入失敗："+e.message); }
  }

  const ORDER_STATUSES = ["未確認","準備中","已出貨"];
  function statusStyle(s) {
    if (s==="未確認") return {background:"var(--warn-tint)",color:"var(--warn)"};
    if (s==="準備中") return {background:"#eef1fb",color:"#3d4f9e"};
    if (s==="已出貨") return {background:"var(--brand-tint)",color:"var(--brand-dark)"};
    return {background:"#f4f6f5",color:"var(--ink-soft)"};
  }
  async function changeOrderStatus(orderId, newStatus) {
    try {
      await callGAS("updateOrderStatus",{orderId, status:newStatus});
      setOrders(prev=>prev.map(o=>o.orderId===orderId?{...o,orderStatus:newStatus}:o));
    } catch(e) { alert("更新失敗："+e.message); }
  }

  // filteredMaster 加入分類篩選

  async function loadMaster() {
    setMLoading(true); setMError("");
    try { const d = await callGAS("listMaster"); setMasterRows(d.rows); localStorage.setItem(LS_MASTER, JSON.stringify(d.rows)); }
    catch(e) { setMError("載入失敗："+e.message); }
    finally { setMLoading(false); }
  }
  useEffect(() => { if (tab==="master" && authed && masterRows.length===0) loadMaster(); }, [tab, authed]);

  function startEdit(row) { setEditCode(row.code); setEditDraft({name:row.name, category:row.category, listPrice:row.listPrice, boxQty:row.boxQty, cost:row.cost||"", inactive:row.inactive}); }
  function cancelEdit() { setEditCode(null); setEditDraft({}); }
  async function saveEdit(row) {
    try { await callGAS("saveMasterRow",{row:{...row,...editDraft}}); setMasterRows(p=>p.map(r=>r.code===row.code?{...r,...editDraft}:r)); setEditCode(null); setEditDraft({}); }
    catch(e) { alert("儲存失敗："+e.message); }
  }
  async function delMaster(code) {
    if (!confirm(`確定刪除品號 ${code}？此動作無法復原。`)) return;
    try { await callGAS("deleteMasterRow",{code}); setMasterRows(p=>p.filter(r=>r.code!==code)); }
    catch(e) { alert("刪除失敗："+e.message); }
  }
  async function addMaster() {
    if (!newM.code||!newM.name) { alert("品號與品名為必填"); return; }
    try { await callGAS("saveMasterRow",{row:newM}); setMasterRows(p=>[...p,{...newM,images:[]}]); setNewM({code:"",name:"",category:"",listPrice:"",boxQty:"",cost:"",inactive:false}); setShowAddM(false); }
    catch(e) { alert("新增失敗："+e.message); }
  }

  // ── 客戶價格表（群組制）──
  const [priceRows,    setPriceRows]    = useState([]);
  const [pGroups,      setPGroups]      = useState([]);
  const [pLoading,     setPLoading]     = useState(false);
  const [pError,       setPError]       = useState("");
  const [pFilter,      setPFilter]      = useState("DEFAULT");
  const [pSearch,      setPSearch]      = useState("");
  const [editPrice,    setEditPrice]    = useState(null);
  const [priceDraft,   setPriceDraft]   = useState({});
  const [showAddP,     setShowAddP]     = useState(false);
  const [newP,         setNewP]         = useState({priceGroup:"DEFAULT",productCode:"",productName:"",unitPrice:"",activity:"",note:""});
  const [showCopyGroup, setShowCopyGroup] = useState(false);
  const [copyTarget,   setCopyTarget]   = useState("");

  async function loadPrices(group) {
    setPLoading(true); setPError("");
    try {
      // 先取群組列表
      const gd = await callGAS("listPriceGroups",{});
      const gs = gd.groups || ["DEFAULT"];
      if (!gs.includes("DEFAULT")) gs.unshift("DEFAULT");
      setPGroups(gs);
      const activeGroup = group || (gs.includes(pFilter)?pFilter:gs[0]);
      setPFilter(activeGroup);
      // 再取該群組資料
      const d = await callGAS("listPrices",{priceGroup:activeGroup});
      setPriceRows(d.rows||[]);
    }
    catch(e) { setPError("載入失敗："+e.message); }
    finally { setPLoading(false); }
  }

  async function switchGroup(g) {
    setPFilter(g);
    setPLoading(true);
    try {
      const d = await callGAS("listPrices",{priceGroup:g});
      setPriceRows(d.rows||[]);
    }
    catch(e) { alert("載入失敗："+e.message); }
    finally { setPLoading(false); }
  }
  useEffect(() => { if (tab==="prices" && authed && priceRows.length===0) loadPrices(); }, [tab, authed]);

  const filteredPrices = useMemo(() => priceRows.filter(r =>
    (!pFilter||r.priceGroup===pFilter) && (!pSearch||r.productCode.includes(pSearch)||String(r.unitPrice).includes(pSearch))
  ), [priceRows, pFilter, pSearch]);

  function startEditP(row) { setEditPrice({g:row.priceGroup,pc:row.productCode}); setPriceDraft({unitPrice:row.unitPrice,activity:row.activity,note:row.note}); }
  function cancelEditP() { setEditPrice(null); setPriceDraft({}); }
  async function saveEditP(row) {
    try {
      await callGAS("savePriceRow",{row:{...row,...priceDraft}});
      setPriceRows(p=>p.map(r=>r.priceGroup===row.priceGroup&&r.productCode===row.productCode?{...r,...priceDraft}:r));
      setEditPrice(null); setPriceDraft({});
    }
    catch(e) { alert("儲存失敗："+e.message); }
  }
  async function delPrice(row) {
    if (!confirm(`確定刪除 ${row.priceGroup} × ${row.productCode} 的價格資料？`)) return;
    try {
      await callGAS("deletePriceRow",{priceGroup:row.priceGroup,productCode:row.productCode});
      setPriceRows(p=>p.filter(r=>!(r.priceGroup===row.priceGroup&&r.productCode===row.productCode)));
    }
    catch(e) { alert("刪除失敗："+e.message); }
  }
  async function addPrice() {
    if (!newP.priceGroup||!newP.productCode||!newP.unitPrice) { alert("群組、品號、單價為必填"); return; }
    try {
      await callGAS("savePriceRow",{row:newP});
      setPriceRows(p=>[...p,{...newP}]);
      setNewP({priceGroup:pFilter,productCode:"",productName:"",unitPrice:"",activity:"",note:""});
      setShowAddP(false);
    }
    catch(e) { alert("新增失敗："+e.message); }
  }
  async function copyGroup() {
    if (!copyTarget.trim()) { alert("請輸入新群組名稱"); return; }
    if (pGroups.includes(copyTarget.trim())) { alert("群組名稱已存在"); return; }
    try {
      const d = await callGAS("copyPriceGroup",{fromGroup:pFilter,toGroup:copyTarget.trim()});
      alert(`已從 ${pFilter} 複製 ${d.copied} 筆到 ${copyTarget.trim()}`);
      setCopyTarget(""); setShowCopyGroup(false);
      await loadPrices(copyTarget.trim());
    }
    catch(e) { alert("複製失敗："+e.message); }
  }
  async function deleteGroup() {
    if (pFilter==='DEFAULT') { alert("DEFAULT 群組不可刪除"); return; }
    if (!confirm(`確定刪除整個「${pFilter}」群組的所有價格資料？\n（此操作不可復原）`)) return;
    try {
      await callGAS("deletePriceGroup",{priceGroup:pFilter});
      await loadPrices("DEFAULT");
    }
    catch(e) { alert("刪除失敗："+e.message); }
  }

  // ── 圖片 ──
  const [uploading,  setUploading]  = useState(null);
  const [lightbox,   setLightbox]   = useState(null);
  const fileRef = useRef(null);

  async function handleUpload(productCode, file) {
    setUploading(productCode);
    try {
      const reader = new FileReader();
      const b64 = await new Promise((res,rej)=>{ reader.onload=e=>res(e.target.result.split(",")[1]); reader.onerror=rej; reader.readAsDataURL(file); });
      const d = await callGAS("uploadImage",{productCode, fileName:file.name, base64Data:b64, mimeType:file.type||"image/jpeg"});
      setMasterRows(p=>p.map(r=>r.code!==productCode?r:{...r,images:[...(r.images||[]),d.imageUrl]}));
    } catch(e) { alert("上傳失敗："+e.message); }
    finally { setUploading(null); }
  }
  async function handleDelImg(productCode, imageUrl) {
    if (!confirm("確定刪除此張圖片？")) return;
    setUploading(productCode);
    try {
      await callGAS("deleteImage",{productCode,imageUrl});
      setMasterRows(p=>p.map(r=>r.code!==productCode?r:{...r,images:(r.images||[]).filter(u=>u!==imageUrl)}));
    } catch(e) { alert("刪除失敗："+e.message); }
    finally { setUploading(null); }
  }
  function openLb(imgs,i,name){setLightbox({images:imgs,index:i,productName:name});}
  function closeLb(){setLightbox(null);}
  function lbPrev(){setLightbox(lb=>({...lb,index:(lb.index-1+lb.images.length)%lb.images.length}));}
  function lbNext(){setLightbox(lb=>({...lb,index:(lb.index+1)%lb.images.length}));}

  // ── 密碼頁 ──
  if (!authed) return (
    <div className="pw-wrap">
      <div className="pw-card">
        <h1>🔒 管理後台</h1>
        <p>請輸入後台密碼</p>
        <input className="pw-input" type="password" placeholder="密碼" value={pwInput} autoFocus
          onChange={e=>{setPwInput(e.target.value);setPwError("");}} onKeyDown={e=>{if(e.key==="Enter")handleLogin();}} />
        {pwError && <div className="login-error">{pwError}</div>}
        <button className="submit-btn" onClick={handleLogin}>進入後台</button>
      </div>
    </div>
  );

  // ── 主畫面 ──
  return (
    <div>
      {uploading && <div className="uploading-mask"><div style={{fontSize:28}}>⏳</div><div>圖片處理中，請稍候…</div></div>}
      {lightbox && (
        <div className="lightbox-mask" onClick={closeLb}>
          <div className="lightbox-inner" onClick={e=>e.stopPropagation()}>
            <button className="lightbox-close" onClick={closeLb}>✕</button>
            {lightbox.images.length>1&&<button className="lightbox-btn" onClick={lbPrev}>‹</button>}
            <img src={lightbox.images[lightbox.index]} alt={lightbox.productName}/>
            {lightbox.images.length>1&&<button className="lightbox-btn" onClick={lbNext}>›</button>}
            {lightbox.images.length>1&&<div className="lightbox-dots">{lightbox.images.map((_,i)=><span key={i} className={i===lightbox.index?"active":""} onClick={()=>setLightbox(lb=>({...lb,index:i}))}/>)}</div>}
          </div>
        </div>
      )}
      <input type="file" accept="image/*" style={{display:"none"}} ref={fileRef}
        onChange={e=>{const f=e.target.files[0];if(f&&uploading)handleUpload(uploading,f);e.target.value="";}} />

      <div className="app-header">
        <div className="app-header-title">管理後台</div>
        <div className="app-header-actions">
          <button className="logout-link" onClick={()=>{
            if(tab==="orders") loadOrders();
            else if(tab==="master") loadMaster();
            else if(tab==="prices") loadPrices();
          }}>🔄 重新整理</button>
          <button className="logout-link" onClick={handleLogout}>登出</button>
        </div>
        <div className="app-header-tabs">
          {[
            ["orders",    "📋 訂單管理"],
            ["dashboard", "📊 數據儀表板"],

            ["prices",    "💰 客戶價格表"],
            ["customers", "👥 客戶管理"],
          ].map(([k,l])=>(
            <div key={k} className="tab-wrap">
              <button className={"tab-btn"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{l}</button>
              {k==="orders" && newOrderCount>0 && <span className="notif-badge">{newOrderCount}</span>}
            </div>
          ))}
        </div>
      </div>

      <div className="admin-wrap">
        <div className="admin-tabs" style={{display:"none"}}>
        </div>

        {/* 新訂單通知橫幅 */}
        {newOrderCount>0 && tab!=="orders" && (
          <div className="new-order-banner">
            🔔 有 {newOrderCount} 筆新訂單等待處理
            <button onClick={()=>{setTab("orders");setNewOrderCount(0);loadOrders();}}>立即查看</button>
            <button onClick={()=>setNewOrderCount(0)}>✕</button>
          </div>
        )}

        {/* ===== 訂單管理 ===== */}
        {tab==="orders" && (
          <React.Fragment>
            <div className="stats">
              <div className="stat-card"><div className="label">篩選後訂單數</div><div className="value">{stats.count}</div></div>
              <div className="stat-card"><div className="label">合計金額</div><div className="value">${stats.total.toLocaleString()}</div></div>
              <div className="stat-card"><div className="label">待複核</div><div className={"value"+(stats.review>0?" warn":"")}>{stats.review}</div></div>
            </div>

              <select value={fStatus} onChange={e=>setFStatus(e.target.value)}>
                <option value="all">全部狀態</option><option value="ok">可匯出</option><option value="review">含待複核</option>
              </select>
              <div className="date-wrap">
                <span>從</span><input type="date" value={fFrom} onChange={e=>setFFrom(e.target.value)}/>
                <span>到</span><input type="date" value={fTo} onChange={e=>setFTo(e.target.value)}/>
                {(fFrom||fTo)&&<button className="ghost-btn" onClick={()=>{setFFrom("");setFTo("");}}>清除</button>}
              </div>

            {filteredOrders.length>0&&(
              <div className="batch-bar">
                <span>{checkedList.length>0?`已勾選 ${checkedList.length} 筆`:`共 ${filteredOrders.length} 筆`}</span>

            ):(

                    <th>訂單編號</th><th>客戶</th><th>時間</th><th>金額</th><th>訂單狀態</th><th></th>
                  </tr></thead>
                  <tbody>
                    {filteredOrders.map(o=>{
                      const ostatus = o.orderStatus||"未確認";

                              onChange={e=>changeOrderStatus(o.orderId, e.target.value)}

                                background:sstyle.background,color:sstyle.color,fontWeight:600}}>

                          <td>{row.customerName}</td>
                          <td style={{fontFamily:"monospace",fontSize:12}}>{row.productCode}</td>
                          <td style={{minWidth:70}}>{isE?<input className="cell-input" value={priceDraft.unitPrice||""} onChange={e=>setPriceDraft(p=>({...p,unitPrice:e.target.value}))} style={{width:80}}/>:<span className="cell-text">{row.unitPrice}</span>}</td>
                          <td style={{minWidth:120}}>{isE?<input className="cell-input" value={priceDraft.activity||""} onChange={e=>setPriceDraft(p=>({...p,activity:e.target.value}))}/>:<span className="cell-text">{row.activity||<em className="empty">—</em>}</span>}</td>
                          <td style={{minWidth:80}}>{isE?<input className="cell-input" value={priceDraft.note||""} onChange={e=>setPriceDraft(p=>({...p,note:e.target.value}))}/>:<span className="cell-text">{row.note||<em className="empty">—</em>}</span>}</td>
                          <td>
                            <div className="row-actions">
                              {isE?<React.Fragment><button className="btn-save" onClick={()=>saveEditP(row)}>儲存</button><button className="btn-cancel" onClick={cancelEditP}>取消</button></React.Fragment>
                                  :<React.Fragment><button className="btn-edit" onClick={()=>startEditP(row)}>編輯</button><button className="btn-del" onClick={()=>delPrice(row)}>刪除</button></React.Fragment>}
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </React.Fragment>
        )}

        {/* ===== 數據儀表板 ===== */}
        {tab==="dashboard" && (
          <React.Fragment>
            {/* 日期篩選 */}
            <div className="dash-filter">
              {[["today","今日"],["week","本週"],["month","本月"],["quarter","本季"],["year","今年"]].map(([p,l])=>(
                <button key={p} className={"dash-quick-btn"+(dashPeriod===p?" active":"")} onClick={()=>setQuickPeriod(p)}>{l}</button>
              ))}
              <input type="date" value={dashFrom} onChange={e=>{setDashFrom(e.target.value);setDashPeriod("custom");}}/>
              <span style={{fontSize:12,color:"var(--ink-soft)"}}>至</span>
              <input type="date" value={dashTo} onChange={e=>{setDashTo(e.target.value);setDashPeriod("custom");}}/>
              <button className="btn-save" style={{padding:"8px 16px",fontSize:13}} onClick={loadDash}>{dashLoading?"載入中…":"查詢"}</button>
            </div>

            {!dash && !dashLoading && <p style={{color:"var(--ink-soft)",fontSize:14}}>選擇日期範圍後按「查詢」</p>}
            {dashLoading && <p style={{color:"var(--ink-soft)",fontSize:14}}>計算中…</p>}

            {dash && (
              <React.Fragment>
                {/* KPI 卡片 */}
                <div className="dash-kpi-row">
                  <div className="kpi-card"><div className="k-label">總營業額</div><div className="k-value green">${dash.summary.totalRevenue.toLocaleString()}</div><div className="k-sub">篩選期間累計</div></div>
                  <div className="kpi-card"><div className="k-label">訂單總數</div><div className="k-value blue">{dash.summary.totalOrders}</div><div className="k-sub">筆</div></div>
                  <div className="kpi-card"><div className="k-label">未確認訂單</div><div className={"k-value"+(dash.summary.pendingCount>0?" warn":"")}>{dash.summary.pendingCount}</div><div className="k-sub">待後台確認</div></div>
                  <div className="kpi-card"><div className="k-label">平均客單價</div><div className="k-value">${dash.summary.totalOrders>0?Math.round(dash.summary.totalRevenue/dash.summary.totalOrders).toLocaleString():"0"}</div></div>
                </div>

                {/* 訂單狀態分布 */}
                <div className="dash-section">
                  <h3>訂單狀態分布</h3>
                  <div className="status-chips">
                    {[["未確認","unc"],["準備中","prep"],["已出貨","ship"]].map(([s,cls])=>(
                      <div key={s} className={"status-chip "+cls}>
                        <span>{s}</span>
                        <span style={{fontSize:18,fontWeight:800}}>{dash.summary.statusMap[s]||0}</span>
                        <span>筆</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* 月度趨勢 */}
                {dash.monthly.length>0 && (
                  <div className="dash-section">
                    <h3>月度營業額趨勢</h3>
                    <div className="bar-chart">
                      {(()=>{
                        const max = Math.max(...dash.monthly.map(m=>m.revenue), 1);
                        return dash.monthly.map(m=>(
                          <div key={m.month} className="bar-row">
                            <span className="bar-label">{m.month}</span>
                            <div className="bar-track"><div className="bar-fill" style={{width:`${(m.revenue/max*100).toFixed(1)}%`}}/></div>
                            <span className="bar-val">${m.revenue.toLocaleString()}</span>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                )}

                {/* 每日趨勢表格 */}
                {dash.daily.length>0 && (
                  <div className="dash-section">
                    <h3>每日明細</h3>
                    <div className="line-chart-wrap">
                      <table className="trend-table">
                        <thead><tr><th>日期</th><th>營業額</th></tr></thead>
                        <tbody>
                          {[...dash.daily].reverse().slice(0,30).map(d=>(
                            <tr key={d.date}>
                              <td>{d.date}</td>
                              <td>${d.revenue.toLocaleString()}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                  {/* Top 客戶 */}
                  <div className="dash-section">
                    <h3>Top 10 客戶（依金額）</h3>
                    <div className="bar-chart">
                      {(()=>{
                        const max = Math.max(...dash.topCustomers.map(c=>c.revenue), 1);
                        return dash.topCustomers.map((c,i)=>(
                          <div key={c.code} className="bar-row">
                            <span className="bar-label" title={c.name}>{i+1}. {c.name}</span>
                            <div className="bar-track"><div className="bar-fill" style={{width:`${(c.revenue/max*100).toFixed(1)}%`,background:"#3d4f9e"}}/></div>
                            <span className="bar-val">${c.revenue.toLocaleString()}</span>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>

                  {/* Top 商品 */}
                  <div className="dash-section">
                    <h3>Top 10 商品（依金額）</h3>
                    <div className="bar-chart">
                      {(()=>{
                        const max = Math.max(...dash.topProducts.map(p=>p.revenue), 1);
                        return dash.topProducts.map((p,i)=>(
                          <div key={p.code} className="bar-row">
                            <span className="bar-label" title={p.name}>{i+1}. {p.name}</span>
                            <div className="bar-track"><div className="bar-fill" style={{width:`${(p.revenue/max*100).toFixed(1)}%`,background:"var(--warn)"}}/></div>
                            <span className="bar-val">${p.revenue.toLocaleString()}</span>
                          </div>
                        ));
                      })()}
                    </div>
                  </div>
                </div>
              </React.Fragment>
            )}
          </React.Fragment>
        )}

        {/* ===== 客戶管理 ===== */}
        {tab==="customers" && (
          <React.Fragment>
            <div style={{display:"flex",gap:10,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
              <input placeholder="搜尋公司名稱、分店代號、統編…" value={custSearch} onChange={e=>setCustSearch(e.target.value)}
                style={{flex:1,minWidth:160,padding:"8px 11px",border:"1px solid var(--line)",borderRadius:8,fontSize:13}}/>
              <select value={custRegion} onChange={e=>setCustRegion(e.target.value)}
                style={{padding:"8px 10px",border:"1px solid var(--line)",borderRadius:8,fontSize:13,background:"#fff"}}>
                <option value="">全部區域</option>
                {["北北基","桃竹苗","宜花東","台中","彰化","南投","雲林","嘉南高"].map(r=>(
                  <option key={r} value={r}>{r}</option>
                ))}
              </select>
              <button className="btn-save" style={{padding:"8px 16px",fontSize:13}} onClick={()=>setShowAddCust(v=>!v)}>
                {showAddCust?"取消新增":"＋ 新增客戶"}
              </button>
              <button className="btn-edit" style={{padding:"8px 14px",fontSize:13}} onClick={loadCustomers}>重新整理</button>
              <button className="btn-save" style={{padding:"8px 14px",fontSize:13,background:"#4a7c59"}} onClick={importCustomers}>📥 匯入名單</button>
              <span style={{fontSize:12,color:"var(--ink-soft)"}}>{filteredCust.length} 個分店</span>
            </div>

            {showAddCust&&(
              <div className="add-form">
                <label className="narrow">統一編號<input value={newCust.taxId} onChange={e=>setNewCust(p=>({...p,taxId:e.target.value}))} placeholder="12345678"/></label>
                <label className="wide">公司名稱＊<input value={newCust.companyName} onChange={e=>setNewCust(p=>({...p,companyName:e.target.value}))} placeholder="麗兒采家"/></label>
                <label className="narrow">客戶編號＊<input value={newCust.branchCode} onChange={e=>setNewCust(p=>({...p,branchCode:e.target.value}))} placeholder="J204200"/></label>
                <label className="narrow">店家名稱<input value={newCust.branchName} onChange={e=>setNewCust(p=>({...p,branchName:e.target.value}))} placeholder="麗兒總倉"/></label>
                <label className="narrow">區域
                  <select value={newCust.region} onChange={e=>setNewCust(p=>({...p,region:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:"1px solid var(--line)",borderRadius:6,fontSize:13}}>
                    <option value="">選擇…</option>
                    {["北北基","桃竹苗","宜花東","台中","彰化","南投","雲林","嘉南高"].map(r=><option key={r} value={r}>{r}</option>)}
                  </select>
                </label>
                <button className="btn-save" style={{alignSelf:"flex-end",padding:"8px 20px"}} onClick={addCust}>確認新增</button>
              </div>
            )}

            {custLoading?<p style={{color:"var(--ink-soft)",fontSize:14}}>載入中…</p>:(
              <div style={{overflowX:"auto"}}>
                <table className="cust-mgmt-table">
                  <thead><tr><th>統一編號</th><th>公司名稱</th><th>客戶編號</th><th>店家名稱</th><th>區域</th><th>價格群組</th><th style={{width:140}}>操作</th></tr></thead>
                  <tbody>
                    {filteredCust.map(row=>{
                      const isE = editCust===row.branchCode;
                      return (
                        <tr key={row.branchCode} className={isE?"editing":""}>
                          <td style={{fontFamily:"monospace",fontSize:12}}>{isE?<input className="cell-input" value={custDraft.taxId??row.taxId} onChange={e=>setCustDraft(p=>({...p,taxId:e.target.value}))} style={{width:90}}/>:row.taxId||<em style={{color:"#bbb"}}>—</em>}</td>
                          <td>{isE?<input className="cell-input" value={custDraft.companyName??row.companyName} onChange={e=>setCustDraft(p=>({...p,companyName:e.target.value}))}/>:<span className="cell-text">{row.companyName}</span>}</td>
                          <td style={{fontFamily:"monospace",fontSize:12}}>{row.branchCode}</td>
                          <td>{isE?<input className="cell-input" value={custDraft.branchName??row.branchName} onChange={e=>setCustDraft(p=>({...p,branchName:e.target.value}))}/>:<span className="cell-text">{row.branchName||<em style={{color:"#bbb"}}>—</em>}</span>}</td>
                          <td>{isE?(
                            <select className="cell-input" value={custDraft.region??row.region??""} onChange={e=>setCustDraft(p=>({...p,region:e.target.value}))} style={{padding:"4px 6px",fontSize:12}}>
                              <option value="">—</option>
                              {["北北基","桃竹苗","宜花東","台中","彰化","南投","雲林","嘉南高"].map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                          ):<span className="cell-text">{row.region||<em style={{color:"#bbb"}}>—</em>}</span>}</td>
                          <td>{isE?(
                            <select className="cell-input" value={custDraft.priceGroup??row.priceGroup??"DEFAULT"} onChange={e=>setCustDraft(p=>({...p,priceGroup:e.target.value}))} style={{padding:"4px 6px",fontSize:12}}>
                              <option value="DEFAULT">DEFAULT</option>
                              {pGroups.filter(g=>g!=="DEFAULT").map(g=><option key={g} value={g}>{g}</option>)}
                            </select>
                          ):<span className="cell-text" style={{fontWeight:row.priceGroup&&row.priceGroup!=="DEFAULT"?700:400,color:row.priceGroup&&row.priceGroup!=="DEFAULT"?"var(--brand-dark)":"inherit"}}>{row.priceGroup||"DEFAULT"}</span>}</td>
                          <td>
                            <div className="row-actions">
                              {isE
                                ?<React.Fragment><button className="btn-save" onClick={()=>saveCust(row)}>儲存</button><button className="btn-cancel" onClick={()=>{setEditCust(null);setCustDraft({});}}>取消</button></React.Fragment>
                                :<React.Fragment><button className="btn-edit" onClick={()=>{setEditCust(row.branchCode);setCustDraft({});}}>編輯</button><button className="btn-del" onClick={()=>delCust(row)}>刪除</button></React.Fragment>
                              }
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            )}
          </React.Fragment>
        )}

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Admin />);
</script>
</body>
</html>
